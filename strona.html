<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Główny</title>
    <style>
        body { margin: 0; display: flex; font-family: Arial; height: 100vh; }
        nav { width: 200px; background: #2c3e50; color: white; display: flex; flex-direction: column; padding: 10px; }
        .tab { padding: 15px; cursor: pointer; border-bottom: 1px solid #34495e; }
        .tab:hover { background: #34495e; }
        main { flex-grow: 1; padding: 20px; background: #eee; }
        .content { display: none; background: white; padding: 20px; height: 100%; }
        .active { display: block; }
    </style>
</head>
<body>

    <script>
        // Sprawdzanie czy użytkownik jest zalogowany
        if (sessionStorage.getItem("isLogged") !== "true") {
            window.location.href = "index.html";
        }
    </script>

    <nav>
        <div class="tab" onclick="pokaz('t1')">Zakładka 1</div>
        <div class="tab" onclick="pokaz('t2')">Zakładka 2</div>
        <button onclick="sessionStorage.clear(); window.location.href='index.html'">Wyloguj</button>
    </nav>

    <main>
        <div id="t1" class="content active"><h1>Treść 1</h1><p>Witaj w panelu!</p></div>
        <div id="t2" class="content"><h1>Treść 2</h1><p>To jest druga zakładka.</p></div>
    </main>

    <script>
        function pokaz(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
