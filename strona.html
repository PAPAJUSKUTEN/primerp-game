<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Główny</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; display: flex; font-family: sans-serif; height: 100vh; }
        
        /* Menu boczne */
        nav { width: 250px; background: #2c3e50; color: white; display: flex; flex-direction: column; }
        .logo { padding: 20px; background: #1a252f; text-align: center; font-weight: bold; }
        
        .tab-link { padding: 15px 25px; color: #bdc3c7; cursor: pointer; border-left: 4px solid transparent; }
        .tab-link:hover { background: #34495e; color: white; }
        .tab-link.active { background: #3e5871; color: white; border-left: 4px solid #e94560; }

        /* Treść po prawej */
        main { flex-grow: 1; padding: 40px; background: #f4f7f6; }
        .content-box { display: none; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .content-box.active { display: block; }
        
        .logout { margin-top: auto; padding: 15px; background: #e74c3c; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <script>
        // Strażnik: jeśli nie było logowania, wróć do index.html
        if (sessionStorage.getItem("isLogged") !== "true") {
            window.location.href = "index.html";
        }
    </script>

    <nav>
        <div class="logo">PANEL ZAKŁADEK</div>
        <div class="tab-link active" onclick="openTab(event, 't1')">🏠 Start</div>
        <div class="tab-link" onclick="openTab(event, 't2')">📂 Dokumenty</div>
        <div class="tab-link" onclick="openTab(event, 't3')">⚙️ Ustawienia</div>
        <button class="logout" onclick="sessionStorage.clear(); window.location.href='index.html';">Wyloguj</button>
    </nav>

    <main>
        <div id="t1" class="content-box active">
            <h1>Strona Główna</h1>
            <p>Witaj! Logowanie zniknęło, a Ty widzisz panel z zakładkami po lewej.</p>
        </div>
        <div id="t2" class="content-box">
            <h1>Twoje Dokumenty</h1>
            <p>Lista plików dostępna tylko dla zalogowanych.</p>
        </div>
        <div id="t3" class="content-box">
            <h1>Ustawienia systemowe</h1>
            <p>Tutaj możesz zmienić parametry panelu.</p>
        </div>
    </main>

    <script>
        function openTab(evt, tabId) {
            // Ukryj wszystkie treści
            document.querySelectorAll('.content-box').forEach(c => c.classList.remove('active'));
            // Odznacz linki
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            
            // Pokaż wybraną treść
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
