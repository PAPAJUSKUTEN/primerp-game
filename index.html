<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoHub - Premium Content</title>
    <style>
        /* Resetowanie domyślnych stylów */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            background-color: #000; 
            color: #ccc; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
        }

        /* NAGŁÓWEK (Top Bar) */
        header {
            background-color: #1b1b1b;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo span {
            background-color: #ff9900;
            color: #000;
            padding: 2px 5px;
            border-radius: 4px;
            margin-left: 3px;
        }

        .search-box {
            flex-grow: 0.5;
            display: flex;
        }

        .search-box input {
            width: 100%;
            padding: 8px 15px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 3px 0 0 3px;
            outline: none;
        }

        .search-box button {
            background: #ff9900;
            border: none;
            padding: 0 15px;
            cursor: pointer;
            border-radius: 0 3px 3px 0;
            font-weight: bold;
        }

        /* GŁÓWNY UKŁAD (Sidebar + Content) */
        .wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* PANEL BOCZNY */
        nav {
            width: 220px;
            background-color: #1b1b1b;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding-top: 10px;
        }

        .nav-item {
            padding: 12px 20px;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            background-color: #2a2a2a;
            color: #ff9900;
        }

        .nav-item.active {
            color: #ff9900;
            background-color: #252525;
            font-weight: bold;
            border-left: 4px solid #ff9900;
        }

        /* TREŚĆ GŁÓWNA */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #0b0b0b;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .content-header h1 {
            font-size: 20px;
            color: #fff;
        }

        /* SIATKA WIDEO */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .video-card {
            background-color: #1b1b1b;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }

        .video-card:hover {
            background-color: #222;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #333;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnail::after {
            content: '▶';
            font-size: 30px;
            color: rgba(255, 153, 0, 0.7);
            opacity: 0;
            transition: 0.3s;
        }

        .video-card:hover .thumbnail::after {
            opacity: 1;
        }

        .duration {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            padding: 2px 4px;
            font-size: 11px;
            border-radius: 2px;
            color: #fff;
        }

        .video-info {
            padding: 10px;
        }

        .video-title {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            font-size: 12px;
            color: #888;
        }

        .hd-tag {
            color: #ff9900;
            font-size: 10px;
            border: 1px solid #ff9900;
            padding: 0 2px;
            border-radius: 2px;
            float: right;
            margin-top: 2px;
        }

        /* Footer / Wyloguj */
        .logout-section {
            margin-top: auto;
            border-top: 1px solid #333;
            padding: 10px;
        }

        .btn-logout {
            width: 100%;
            padding: 8px;
            background: #333;
            color: #888;
            border: none;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn-logout:hover { color: #fff; background: #444; }

        /* Media Queries dla telefonów */
        @media (max-width: 768px) {
            nav { width: 60px; }
            .nav-item span { display: none; }
            .search-box { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">VIDEO<span>HUB</span></a>
        <div class="search-box">
            <input type="text" placeholder="Szukaj wideo...">
            <button>Szukaj</button>
        </div>
        <div style="font-size: 14px; color: #ff9900; font-weight: bold;">PREMIUM</div>
    </header>

    <div class="wrapper">
        <nav>
            <div class="nav-item active">🏠 <span>Strona Główna</span></div>
            <div class="nav-item">🔥 <span>Najnowsze</span></div>
            <div class="nav-item">⭐ <span>Top Rated</span></div>
            <div class="nav-item">📂 <span>Kategorie</span></div>
            <div class="nav-item">👠 <span>Modelki</span></div>
            <div class="nav-item">🕶️ <span>VR</span></div>
            
            <div class="logout-section">
                <button class="btn-logout">Wyloguj się</button>
            </div>
        </nav>

        <main>
            <div class="content-header">
                <h1>Polecane Wideo</h1>
                <div style="font-size: 13px;">Sortuj: <span style="color:#ff9900">Najtrafniejsze ▼</span></div>
            </div>

            <div class="video-grid">
                <script>
                    for(let i=1; i<=12; i++) {
                        document.write(`
                            <div class="video-card">
                                <div class="thumbnail">
                                    <div style="color:#444">PREVIEW</div>
                                    <span class="duration">12:45</span>
                                </div>
                                <div class="video-info">
                                    <span class="hd-tag">HD</span>
                                    <div class="video-title">Bardzo chwytliwy tytuł wideo numer ${i} które warto obejrzeć</div>
                                    <div class="video-meta">
                                        1.5M wyświetleń • 98%
                                    </div>
                                </div>
                            </div>
                        `);
                    }
                </script>
            </div>
        </main>
    </div>

</body>
</html>
