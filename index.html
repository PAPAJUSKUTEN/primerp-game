<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel boczny</title>
  <style>
    :root{
      --bg: #070707;
      --panel: #0b0b0b;
      --btn: #111111;
      --btn-hover: #171717;
      --text: #bcbcbc;
      --text-dim: #7e7e7e;
      --accent: #f3b81f;
      --accent-2: #ffcf4d;
      --shadow: rgba(0,0,0,.55);
      --glow: rgba(243,184,31,.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(243,184,31,.12), transparent 35%),
        linear-gradient(180deg, #090909 0%, #050505 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
    }

    .sidebar {
      width: 320px;
      background: linear-gradient(180deg, rgba(12,12,12,.98), rgba(8,8,8,.98));
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 18px;
      padding: 18px 16px 22px;
      box-shadow:
        0 20px 50px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,.03);
      position: relative;
      overflow: hidden;
    }

    .sidebar::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,.04), transparent 40%);
      pointer-events: none;
    }

    .title {
      text-align: center;
      letter-spacing: 0.45em;
      font-size: 15px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 22px;
      text-shadow: 0 0 18px rgba(243,184,31,.18);
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      min-height: 64px;
      padding: 0 18px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(180deg, #121212, #0e0e0e);
      color: var(--text-dim);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 8px 18px rgba(0,0,0,.35);
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, color .18s ease, box-shadow .18s ease, filter .18s ease;
      text-align: left;
      outline: none;
    }

    .item:hover {
      transform: translateY(-1px);
      background: linear-gradient(180deg, #171717, #111111);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 10px 24px rgba(0,0,0,.45);
      color: #d8d8d8;
    }

    .item.active {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      color: #111;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05),
        0 10px 24px rgba(243,184,31,.22),
        0 0 22px var(--glow);
    }

    .item.active .icon {
      filter: none;
    }

    .icon {
      width: 24px;
      text-align: center;
      font-size: 18px;
      filter: grayscale(0.2) brightness(0.9);
      flex: 0 0 24px;
    }

    .label {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
    }

    .content {
      margin-top: 18px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      color: #d7d7d7;
      min-height: 120px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }

    .content h2 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #fff;
    }

    .content p {
      color: #a9a9a9;
      line-height: 1.5;
      font-size: 14px;
    }

    @media (max-width: 420px) {
      .sidebar {
        width: 100%;
      }
      .label {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="title">PROJECT</div>

    <div class="menu">
      <button class="item active" onclick="setActive(this, 'O nas / Nowości', 'Tutaj możesz wstawić aktualności, opis serwera i najważniejsze informacje.')">
        <span class="icon">🏠</span>
        <span class="label">O NAS / NOWOŚCI</span>
      </button>

      <button class="item" onclick="setActive(this, 'Mapa sektorów', 'W tym miejscu możesz dodać mapę sektorów, strefy i lokalizacje.')">
        <span class="icon">🗺️</span>
        <span class="label">MAPA SEKTORÓW</span>
      </button>

      <button class="item" onclick="setActive(this, 'Administracja', 'Sekcja administracji, kontakt do zarządu i lista osób odpowiedzialnych.')">
        <span class="icon">🛡️</span>
        <span class="label">ADMINISTRACJA</span>
      </button>

      <button class="item" onclick="setActive(this, 'Regulamin serwera', 'Dodaj tutaj regulamin, zasady oraz wszystkie ważne wytyczne.')">
        <span class="icon">📜</span>
        <span class="label">REGULAMIN SERWERA</span>
      </button>

      <button class="item" onclick="setActive(this, 'Centrum zgłoszeń', 'Tutaj możesz umieścić formularz zgłoszeń, odwołań i kontaktu.')">
        <span class="icon">🐞</span>
        <span class="label">CENTRUM ZGŁOSZEŃ</span>
      </button>
    </div>

    <div class="content">
      <h2 id="title">O nas / Nowości</h2>
      <p id="desc">Tutaj możesz wstawić aktualności, opis serwera i najważniejsze informacje.</p>
    </div>
  </div>

  <script>
    function setActive(btn, title, desc) {
      document.querySelectorAll(".item").forEach(el => el.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("title").textContent = title;
      document.getElementById("desc").textContent = desc;
    }
  </script>
</body>
</html>
