<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --primary: #6366f1;
        --sidebar-bg: #0f172a;
        --text-light: #f8fafc;
        --bg-body: #f1f5f9;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background-color: var(--bg-body); color: #334155; }
    
    .dashboard { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    
    .sidebar { background: var(--sidebar-bg); color: var(--text-light); padding: 2rem 1rem; }
    .sidebar h2 { font-size: 1.25rem; margin-bottom: 2rem; padding-left: 1rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .nav-list { list-style: none; padding: 0; }
    .nav-item { 
        padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 0.5rem; 
        cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px;
    }
    .nav-item:hover { background: #1e293b; color: #fff; }
    .nav-item.active { background: var(--primary); color: white; }
    
    .main-content { padding: 3rem; }
    .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<div class="dashboard">
    <nav class="sidebar">
        <h2>Panel Główny</h2>
        <ul class="nav-list">
            <li class="nav-item active">Informacje</li>
            <li class="nav-item">Serwery RP</li>
            <li class="nav-item">Regulamin</li>
            <li class="nav-item">Ekipa</li>
            <li class="nav-item">Statystyki</li>
            <li class="nav-item">Kontakt</li>
        </ul>
    </nav>
    <main class="main-content">
        <div class="card">
            <h1 id="page-title">Informacje</h1>
            <p id="page-content">Witamy w systemie zarządzania społecznością. Tutaj znajdziesz wszystkie najważniejsze aktualności.</p>
        </div>
    </main>
</div>

</body>
</html>
