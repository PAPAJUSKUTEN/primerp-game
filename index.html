<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAJBARDZIEJ ZJEBANA STRONA INTERNETOWA 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Sans+MS&display=swap');
        
        body {
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff0000);
            background-size: 400% 400%;
            animation: rainbow 0.3s linear infinite;
            font-family: 'Comic Sans MS', cursive;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: #00ff00;
            text-shadow: 3px 3px 0 #000,
                        -3px -3px 0 #000,
                        3px -3px 0 #000,
                        -3px 3px 0 #000;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 80px;
            text-align: center;
            animation: shake 0.1s linear infinite;
            transform: rotate(-5deg);
            margin: 20px;
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-2deg); }
            20% { transform: translate(-3px, 0px) rotate(2deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 2px) rotate(-2deg); }
            80% { transform: translate(-1px, -1px) rotate(2deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(2px, -2px) rotate(-1deg); }
        }

        .container {
            position: relative;
            z-index: 1;
        }

        marquee {
            font-size: 40px;
            color: yellow;
            text-shadow: 4px 4px #ff00ff;
        }

        img {
            position: absolute;
            animation: spin 1s linear infinite;
            width: 150px;
            border: 8px solid red;
            box-shadow: 0 0 30px yellow;
        }

        .popup {
            position: fixed;
            background: rgba(0,0,0,0.9);
            color: lime;
            border: 5px dashed red;
            padding: 20px;
            font-size: 25px;
            z-index: 9999;
            animation: popupAnim 0.5s;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        button {
            font-size: 30px;
            padding: 20px 40px;
            background: #ff00ff;
            color: yellow;
            border: 6px solid lime;
            cursor: pointer;
            animation: pulse 0.5s infinite;
            transform: rotate(8deg);
        }

        @keyframes pulse {
            0% { transform: scale(1) rotate(8deg); }
            50% { transform: scale(1.2) rotate(-8deg); }
        }
    </style>
</head>
<body>

    <h1>TA STRONA JEST KURWA ZJEBANA</h1>
    
    <marquee direction="left">KLIKNIJ WSZĘDZIE • TWOJA MATKA TO KOBYŁA • 420 BLAZE IT • POLSKA GUROM</marquee>
    <marquee direction="right" style="font-size:60px;">NIE ZAMYKAJ TEJ KARTY • JESTEŚ TU NA ZAWSZE</marquee>

    <div class="container" style="text-align:center; margin-top:50px;">
        <h2 style="font-size:60px; color:red;">WITAJ W PIEKLE INTERNETU</h2>
        <p style="font-size:35px;">Twoja strona została zhackowana przez Janusza z Będzina</p>
        
        <button onclick="spam()">KLIKNIJ MNIE JEŚLI JESTEŚ PEDALEM</button>
        <button onclick="rickroll()">NIE KLIKAJ TEGO</button>
    </div>

    <!-- Spinning images everywhere -->
    <img src="https://picsum.photos/200/200?random=1" style="top:10%; left:5%;">
    <img src="https://picsum.photos/200/200?random=2" style="top:30%; left:15%; animation-duration:0.4s;">
    <img src="https://picsum.photos/200/200?random=3" style="top:60%; right:10%;">
    <img src="https://picsum.photos/200/200?random=4" style="bottom:20%; left:20%; animation-duration:1.5s;">
    <img src="https://picsum.photos/200/200?random=5" style="top:15%; right:25%;">

    <audio autoplay loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        function spam() {
            for(let i = 0; i < 15; i++) {
                setTimeout(() => {
                    alert("GRATULACJE JESTEŚ PEDALEM " + Math.random().toString(36).substring(7).toUpperCase());
                }, i * 80);
            }
        }

        function rickroll() {
            window.open("https://www.youtube.com/watch?v=dQw4w9wgxcq", "_blank");
        }

        // Random popups
        setInterval(() => {
            const popup = document.createElement('div');
            popup.className = 'popup';
            popup.style.left = Math.random() * 70 + '%';
            popup.style.top = Math.random() * 70 + '%';
            popup.innerHTML = `
                <h3>UWAGA!!!</h3>
                <p>${['Twoja mama dzwoni', 'Masz wirusa', 'Kup viagrę', 'POLSKA GUROM', 'Windows XP detected'][Math.floor(Math.random()*5)]}</p>
                <button onclick="this.parentElement.remove()">OK KURWA</button>
            `;
            document.body.appendChild(popup);
            
            setTimeout(() => {
                if(popup.parentElement) popup.remove();
            }, 4500);
        }, 1200);

        // Cursor trail of dicks (emoji)
        document.addEventListener('mousemove', (e) => {
            const dick = document.createElement('div');
            dick.textContent = '🍆';
            dick.style.position = 'fixed';
            dick.style.left = e.pageX + 'px';
            dick.style.top = e.pageY + 'px';
            dick.style.fontSize = '30px';
            dick.style.zIndex = '99999';
            dick.style.pointerEvents = 'none';
            dick.style.opacity = '0.8';
            document.body.appendChild(dick);
            
            setTimeout(() => dick.remove(), 800);
        });

        // Konami code = more chaos
        let konami = '';
        document.addEventListener('keydown', (e) => {
            konami += e.key;
            if(konami.length > 10) konami = konami.slice(-10);
            if(konami.includes('ArrowUpArrowUpArrowDownArrowDownArrowLeftArrowRightArrowLeftArrowRightba')) {
                document.body.style.filter = 'invert(1) hue-rotate(180deg)';
                alert('KONAMI ACTIVATED - JESZCZE WIĘCEJ ZJEBANIA');
            }
        });

        console.log("%cTA STRONA JEST TAK ZJEBANA ŻE NIELUDZIE", "color:red; font-size:50px; font-family:Comic Sans MS");
    </script>
</body>
</html>
