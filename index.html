<script>
document.getElementById("rekrutacja").addEventListener("submit", async (e) => {
    e.preventDefault();

    const webhookURL = "https://discord.com/api/webhooks/1510830173698785280/-OwFcHZwOsoG6_UGKkGfFjXvV4vqcv7WKge6VpWjDTSYHU8u-vQn_rmQHAf6GHUY-Jyn";

    const nick = document.getElementById("nick").value;
    const wiek = document.getElementById("wiek").value;
    const discordid = document.getElementById("discordid").value;
    const powod = document.getElementById("powod").value;
    const doswiadczenie = document.getElementById("doswiadczenie").value;

    const payload = {
        embeds: [{
            title: "Nowe zgłoszenie",
            fields: [
                { name: "Nick", value: nick },
                { name: "Wiek", value: wiek },
                { name: "ID Discord", value: discordid },
                { name: "Powód", value: powod },
                { name: "Doświadczenie", value: doswiadczenie }
            ],
            timestamp: new Date().toISOString()
        }]
    };

    try {
        const response = await fetch(webhookURL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            document.getElementById("status").innerHTML =
                "✅ Zgłoszenie wysłane.";
            e.target.reset();
        } else {
            document.getElementById("status").innerHTML =
                "❌ Discord odrzucił zgłoszenie.";
        }
    } catch (err) {
        document.getElementById("status").innerHTML =
            "❌ Nie udało się połączyć z webhookiem.";
        console.error(err);
    }
});
</script>
