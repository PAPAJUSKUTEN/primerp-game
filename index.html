<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Ranking Klanów</title>
    <style>
        /* CSS - Wygląd aplikacji */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #e94560; margin-top: 30px; }
        #clan-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .clan-card { background: #16213e; border: 2px solid #0f3460; border-radius: 15px; padding: 20px; width: 250px; text-align: center; transition: transform 0.3s; }
        .clan-card:hover { transform: scale(1.05); border-color: #e94560; }
        .clan-name { font-size: 1.5rem; font-weight: bold; color: #00d2ff; margin-bottom: 10px; }
        .clan-info { font-size: 0.9rem; color: #95a5a6; }
    </style>
</head>
<body>

    <h1>Lista Naszych Klanów</h1>
    
    <div id="clan-list"></div>

    <script>
        // JavaScript - Dane i logika
        
        // 1. Lista klanów (możesz tu dopisać własne!)
        const klany = [
            { nazwa: "Smoki Północy", czlonkowie: 24, poziom: 10 },
            { nazwa: "Cyber Duchy", czlonkowie: 15, poziom: 7 },
            { nazwa: "Złoci Rycerze", czlonkowie: 30, poziom: 12 },
            { nazwa: "Bractwo Kodu", czlonkowie: 8, poziom: 5 }
        ];

        // 2. Funkcja wyświetlająca klany na stronie
        function wyswietlKlany() {
            const kontener = document.getElementById('clan-list');
            
            klany.forEach(klan => {
                // Tworzymy element karty dla każdego klanu
                const karta = document.createElement('div');
                karta.className = 'clan-card';
                
                karta.innerHTML = `
                    <div class="clan-name">${klan.nazwa}</div>
                    <div class="clan-info">Członkowie: ${klan.czlonkowie}</div>
                    <div class="clan-info">Poziom: ${klan.poziom}</div>
                `;
                
                kontener.appendChild(karta);
            });
        }

        // Uruchomienie funkcji po załadowaniu strony
        wyswietlKlany();
    </script>
</body>
</html>
