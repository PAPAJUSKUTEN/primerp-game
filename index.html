<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoHub - Premium Content</title>
    <style>
        /* Reset i podstawowe style */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #0f0f0f; 
            color: #ffffff; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }

        /* PASEK BOCZNY (Sidebar) */
        aside {
            width: 240px;
            background-color: #1b1b1b;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            flex-shrink: 0;
        }

        .logo {
            padding: 25px 20px;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
        }
        .logo span {
            background-color: #ff9900;
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 4px;
        }

        .menu-section {
            padding: 20px 0;
            flex-grow: 1;
            overflow-y: auto;
        }

        .menu-item {
            padding: 12px 20px;
            color: #bbb;
            text-decoration: none;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background-color: #2a2a2a;
            color: #ff9900;
        }

        .menu-item.active {
            background-color: #252525;
            color: #ff9900;
            border-left: 3px solid #ff9900;
            font-weight: bold;
        }

        /* GŁÓWNA TREŚĆ */
        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 25px;
            background: linear-gradient(to bottom, #141414, #0f0f0f);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .search-bar {
            background: #222;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 20px;
            width: 400px;
            color: white;
            outline: none;
        }

        /* SIATKA WIDEO (Grid) */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .video-card {
            background-color: #1b1b1b;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #333;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-weight: bold;
        }

        .thumbnail::after {
            content: '▶';
            font-size: 40px;
            opacity: 0;
            transition: opacity 0.3s;
            color: #ff9900;
        }

        .video-card:hover .thumbnail::after {
            opacity: 1;
        }

        .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.8);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            color: #fff;
        }

        .video-info {
            padding: 12px;
        }

        .video-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #eee;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-stats {
            font-size: 13px;
            color: #888;
            display: flex;
            justify-content: space-between;
        }

        .hd-tag {
            color: #ff9900;
            font-weight: bold;
            font-size: 11px;
            border: 1px solid #ff9900;
            padding: 0 4px;
            border-radius: 2px;
        }

        /* Responsywność */
        @media (max-width: 768px) {
            aside { width: 70px; }
            .logo, .menu-item span { display: none; }
            .menu-item { justify-content: center; font-size: 20px; }
            .search-bar { width: 150px; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo">VIDEO<span>HUB</span></div>
        <div class="menu-section">
            <div class="menu-item active" onclick="changeCategory('Polecane')">🏠 <span>Strona Główna</span></div>
            <div class="menu-item" onclick="changeCategory('Najnowsze')">🔥 <span>Najnowsze</span></div>
            <div class="menu-item" onclick="changeCategory('Najlepiej oceniane')">⭐ <span>Top Rated</span></div>
            <div class="menu-item" onclick="changeCategory('Kategorie')">📂 <span>Kategorie</span></div>
            <div class="menu-item" onclick="changeCategory('Modelki')">👠 <span>Pornstars</span></div>
            <div class="menu-item" onclick="changeCategory('Społeczność')">💬 <span>Społeczność</span></div>
            <div style="margin-top: 20px; padding: 10px 20px; font-size: 11px; color: #555; text-transform: uppercase;">Moja Biblioteka</div>
            <div class="menu-item">🕒 <span>Historia</span></div>
            <div class="menu-item">❤️ <span>Ulubione</span></div>
        </div>
    </aside>

    <main>
        <header>
            <h2 id="category-title">Polecane Wideo</h2>
            <input type="text" class="search-bar" placeholder="Szukaj wideo, kategorii, modelek...">
        </header>

        <div class="video-grid">
            <script>
                const titles = [
                    "Szybka akcja w biurze", "Gorący letni wieczór", 
                    "Prywatna sesja wideo", "Nocna przygoda w mieście", 
                    "Tajemniczy gość", "Powrót do domu",
                    "Egzotyczne wakacje HD", "Nowa kolekcja 2024"
                ];

                for (let i = 1; i <= 12; i++) {
                    const title = titles[Math.floor(Math.random() * titles.length)];
                    const views = (Math.random() * 5).toFixed(1) + "M";
                    const rating = Math.floor(Math.random() * 20 + 80) + "%";
                    const time = Math.floor(Math.random() * 20 + 5) + ":" + Math.floor(Math.random() * 50 + 10);

                    document.write(`
                        <div class="video-card">
                            <div class="thumbnail">
                                Podgląd ${i}
                                <span class="duration">${time}</span>
                            </div>
                            <div class="video-info">
                                <div class="video-title">${title} #${i}</div>
                                <div class="video-stats">
                                    <span>${views} wyświetleń • ${rating}</span>
                                    <span class="hd-tag">4K</span>
                                </div>
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>
    </main>

    <script>
        function changeCategory(name) {
            document.getElementById('category-title').innerText = name;
            // Usunięcie klasy active ze wszystkich i dodanie do klikniętego
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
        }
    </script>

</body>
</html>
