<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFH Clan - Pet Simulator 99</title>
    <style>
        :root {
            --ps99-blue: #00b4ff;
            --ps99-yellow: #ffca28;
            --ps99-dark: #1a1a2e;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--ps99-dark);
            background-image: radial-gradient(circle, #2a2a4e 0%, #1a1a2e 100%);
            color: white;
            overflow-x: hidden;
        }

        /* Mały przycisk w rogu */
        .login-corner {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .btn-mini-login {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-mini-login:hover {
            background: var(--ps99-blue);
            border-color: var(--ps99-blue);
        }

        /* Ekran główny */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .clan-logo {
            font-size: 80px;
            font-weight: 900;
            color: var(--ps99-yellow);
            text-shadow: 0 0 20px rgba(255, 202, 40, 0.5), 4px 4px 0px #855e00;
            margin-bottom: 10px;
        }

        .clan-tag {
            background: var(--ps99-blue);
            padding: 5px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0, 180, 255, 0.4);
        }

        .stats-preview {
            margin-top: 50px;
            display: flex;
            gap: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border-bottom: 4px solid var(--ps99-blue);
            min-width: 120px;
        }

        .stat-card span {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: var(--ps99-yellow);
        }

        /* Panel logowania (overlay) */
        #login-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .login-box {
            background: #252545;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--ps99-blue);
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            background: var(--ps99-blue);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="login-corner">
        <button class="btn-mini-login" onclick="toggleLogin()">LOGOWANIE CZŁONKÓW</button>
    </div>

    <section class="hero">
        <div class="clan-logo">FIFH</div>
        <div class="clan-tag">TOP CLAN | PET SIMULATOR 99</div>

        <div class="stats-preview">
            <div class="stat-card">
                <p>Członkowie</p>
                <span>50/50</span>
            </div>
            <div class="stat-card">
                <p>Diamenty</p>
                <span>1.2B+</span>
            </div>
            <div class="stat-card">
                <p>Ranga</p>
                <span>#120</span>
            </div>
        </div>
    </section>

    <!-- Okno logowania -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>Panel Członka</h2>
            <input type="text" placeholder="Nick z Roblox">
            <input type="password" id="pass" placeholder="Hasło klanowe">
            <button class="btn-submit" onclick="checkPass()">Zaloguj</button>
            <button style="background:none; border:none; color:gray; cursor:pointer; margin-top:10px" onclick="toggleLogin()">Anuluj</button>
        </div>
    </div>

    <script>
        function toggleLogin() {
            const overlay = document.getElementById('login-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }

        function checkPass() {
            const pass = document.getElementById('pass').value;
            if (pass === "fifh99") {
                alert("Witaj w panelu FIFH!");
                // Tutaj możemy przekierować do innej strony
                window.location.href = "#"; 
            } else {
                alert("Nieprawidłowe hasło klanowe!");
            }
        }
    </script>

</body>
</html>
