<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirtualny System RP</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="video-background">
        </div>
    
    <div class="overlay"></div>

    <div class="container">
        <header>
            <h1 class="logo">WIRTUALNY<span>SYSTEM</span>RP</h1>
            <p class="slogan">Nowa era rozgrywki tekstowej</p>
        </header>

        <main class="main-content">
            <div class="status-box">
                <div class="status-item">
                    <span class="label">SERWER:</span>
                    <span class="value online">ONLINE</span>
                </div>
                <div class="status-item">
                    <span class="label">GRACZY:</span>
                    <span class="value">128 / 250</span>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="startApp()">URUCHOM SYSTEM</button>
                <button class="btn btn-secondary">DOŁĄCZ DO DISCORDA</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Wirtualny System RP. Wszystkie prawa zastrzeżone.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
