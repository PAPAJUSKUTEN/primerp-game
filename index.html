<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Alarmowy</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            color: #ffcc00;
        }

        .alarm-box {
            text-align: center;
            padding: 50px;
            border: 5px double #ffcc00;
            background: #000;
            box-shadow: 0 0 20px #ffcc00;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Efekt pulsowania dla przycisku */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 204, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); }
        }

        #alarmBtn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            transition: 0.3s;
        }

        #alarmBtn:hover {
            background: #fff;
            transform: scale(1.05);
        }

        #alarmBtn:active {
            background: #cc0000;
            color: #fff;
        }

        #alarmBtn:disabled {
            background: #333;
            color: #666;
            animation: none;
        }

        #yt-player {
            position: absolute;
            top: -999px;
        }
    </style>
</head>
<body>

    <div class="alarm-box">
        <h1>System Ostrzegawczy</h1>
        <p>UWAGA: TEST SYGNAŁU ALARMOWEGO</p>
        <button id="alarmBtn" onclick="toggleAlarm()" disabled>Ładowanie sygnału...</button>
    </div>

    <div id="yt-player"></div>

    <script>
        var player;
        var isPlaying = false;
        
        // NOWE ID: Syrena alarmowa
        var videoId = 'erOitvSsc8g';

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '1',
                width: '1',
                videoId: videoId,
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            var btn = document.getElementById("alarmBtn");
            btn.innerHTML = "URUCHOM ALARM ⚠️";
            btn.disabled = false;
        }

        function toggleAlarm() {
            var btn = document.getElementById("alarmBtn");
            if (!isPlaying) {
                player.playVideo();
                btn.innerHTML = "ZATRZYMAJ ALARM 🛑";
                btn.style.background = "#cc0000";
                btn.style.color = "#fff";
                isPlaying = true;
            } else {
                player.pauseVideo();
                btn.innerHTML = "URUCHOM ALARM ⚠️";
                btn.style.background = "#ffcc00";
                btn.style.color = "#000";
                isPlaying = false;
            }
        }
    </script>
</body>
</html>
