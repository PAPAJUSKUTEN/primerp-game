<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUBA | Dev Core 2030</title>
    <!-- IKONA STRONY (💻) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --discord: #5865F2;
            --text: #e0e0e0;
            --text-dim: #808080;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .sidebar {
            display: grid;
            grid-template-rows: auto auto auto 1fr auto;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .music-card {
            cursor: pointer;
            border: 1px dashed var(--accent);
            text-align: center;
        }
        .music-card.playing { border-style: solid; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .discord-card {
            background: linear-gradient(135deg, rgba(88, 101, 242, 0.1), rgba(0,0,0,0));
            border: 1px solid var(--discord);
            cursor: pointer;
            text-align: center;
            overflow: hidden;
        }
        .discord-card:hover { background: var(--discord); color: white; }
        .discord-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.8; }
        .discord-card .username { font-size: 1.1rem; font-family: 'JetBrains Mono', monospace; font-weight: bold; }

        .profile h1 {
            margin: 0; font-size: 2.5rem; letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .tag {
            display: inline-block; background: rgba(0, 242, 255, 0.1);
            color: var(--accent); padding: 4px 12px; border-radius: 100px;
            font-size: 12px; font-weight: 700; margin-top: 8px;
        }

        .tech-item {
            display: inline-block; font-size: 12px; color: var(--text-dim);
            border: 1px solid var(--border); padding: 4px 10px;
            border-radius: 8px; margin: 0 4px 8px 0;
        }

        .terminal-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 32px;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .terminal-header {
            padding: 15px 25px; background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .terminal-body {
            padding: 40px; font-family: 'JetBrains Mono', monospace;
            font-size: 15px; line-height: 1.8; overflow-y: auto;
        }

        .code-keyword { color: #ff7b72; }
        .code-func { color: #d2a8ff; }
        .code-string { color: #a5d6ff; }
        .code-comment { color: #8b949e; }

        #youtube-player { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }

        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
        }
    </style>
</head>
<body>

<div id="youtube-player"></div>

<div class="container">
    <aside class="sidebar">
        <div class="card profile">
            <h1>Kuba.dev</h1>
            <span class="tag">SOFTWARE ENGINEER</span>
            <p style="color: var(--text-dim); margin-top: 15px; font-size: 0.9rem;">4 lata doświadczenia w budowaniu przyszłości.</p>
        </div>

        <div class="card music-card" id="musicToggle" onclick="toggleMusic()">
            <div style="font-weight: bold; letter-spacing: 1px; color: var(--accent);">NACIŚNIJ NA MNIE</div>
            <div id="musicStatus" style="font-size: 11px; color: var(--text-dim);">ODTWÓRZ ATMOSFERĘ</div>
        </div>

        <div class="card">
            <h3 style="margin: 0 0 15px 0; font-size: 12px; color: var(--accent); text-transform: uppercase;">Zestaw narzędzi</h3>
            <div>
                <span class="tech-item">JS</span><span class="tech-item">React</span>
                <span class="tech-item">Node</span><span class="tech-item">Python</span>
                <span class="tech-item">C++</span>
            </div>
        </div>

        <div class="card discord-card" id="discordBtn" onclick="copyDiscord()">
            <div class="label">Kontakt via Discord</div>
            <div class="username" id="discordNick">kubasruba0713_0</div>
            <div id="copyHint" style="font-size: 9px; margin-top: 8px; opacity: 0.6;">KLIKNIJ, ABY SKOPIOWAĆ NICK</div>
        </div>
    </aside>

    <main class="terminal-container">
        <div class="terminal-header">
            <div style="display: flex; gap: 8px;">
                <div style="width:10px; height:10px; border-radius:50%; background:#ff5f56"></div>
                <div style="width:10px; height:10px; border-radius:50%; background:#ffbd2e"></div>
                <div style="width:10px; height:10px; border-radius:50%; background:#27c93f"></div>
            </div>
            <span style="font-size: 11px; color: var(--text-dim);">kuba_system.cpp</span>
        </div>
        <div class="terminal-body" id="code"></div>
    </main>
</div>

<script>
    function copyDiscord() {
        const nick = "kubasruba0713_0";
        navigator.clipboard.writeText(nick);
        const card = document.getElementById('discordBtn');
        const hint = document.getElementById('copyHint');
        card.style.borderColor = "#00ff00";
        hint.innerText = "SKOPIOWANO!";
        hint.style.color = "#00ff00";
        setTimeout(() => {
            card.style.borderColor = "";
            hint.innerText = "KLIKNIJ, ABY SKOPIOWAĆ NICK";
            hint.style.color = "";
        }, 2000);
    }

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    var isPlaying = false;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            videoId: '3GnwNV72UbE',
            playerVars: { 'loop': 1, 'playlist': '3GnwNV72UbE' }
        });
    }

    function toggleMusic() {
        if (!isPlaying) {
            player.playVideo();
            document.getElementById('musicToggle').classList.add('playing');
            document.getElementById('musicStatus').innerText = "SYSTEM AUDIO: ONLINE";
            isPlaying = true;
        } else {
            player.pauseVideo();
            document.getElementById('musicToggle').classList.remove('playing');
            document.getElementById('musicStatus').innerText = "SYSTEM AUDIO: PAUSED";
            isPlaying = false;
        }
    }

    const codeText = `/* 
 * Kuba Dev OS v4.0.0
 * Status: Available for projects
 */

#include <iostream>

void initialize_profile() {
    std::string user = "kubasruba0713_0";
    int experience = 4;
    
    std::cout << "Loading system..." << std::endl;
    std::cout << "Target: Build the future." << std::endl;
}

int main() {
    initialize_profile();
    return 0;
}`;

    let i = 0;
    function type() {
        if (i < codeText.length) {
            document.getElementById("code").textContent += codeText.charAt(i);
            i++;
            setTimeout(type, 25);
        } else {
            const el = document.getElementById("code");
            let html = el.textContent
                .replace(/(#include|void|int|return|std|string)/g, '<span class="code-keyword">$1</span>')
                .replace(/(initialize_profile|main|cout|endl)/g, '<span class="code-func">$1</span>')
                .replace(/(\".*\")/g, '<span class="code-string">$1</span>')
                .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="code-comment">$1</span>');
            el.innerHTML = html;
        }
    }
    window.onload = type;
</script>

</body>
</html>
