<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuba | Portfolio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --window-bg: #161b22;
            --text-color: #c9d1d9;
            --keyword: #ff7b72;
            --function: #d2a8ff;
            --string: #a5d6ff;
            --comment: #8b949e;
            --number: #79c0ff;
            --cursor-color: #58a6ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .terminal-window {
            width: 90%;
            max-width: 850px;
            background: var(--window-bg);
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid #30363d;
            overflow: hidden;
        }

        .header {
            background: #21262d;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .title { margin-left: 20px; font-size: 13px; color: #8b949e; flex-grow: 1; text-align: center; }

        .content {
            padding: 25px;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre;
        }

        .kwd { color: var(--keyword); }
        .func { color: var(--function); }
        .str { color: var(--string); }
        .cmt { color: var(--comment); }
        .num { color: var(--number); }

        #typewriter::after {
            content: "|";
            color: var(--cursor-color);
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
        
        a { color: var(--string); text-decoration: none; border-bottom: 1px dashed; }
        a:hover { color: #fff; border-bottom: 1px solid; }
    </style>
</head>
<body>

<div class="terminal-window">
    <div class="header">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="title">kuba_dev — profile.cpp</div>
    </div>
    <div class="content" id="typewriter"></div>
</div>

<script>
    const codeText = 
`/*
 * 4 lata doświadczenia w budowaniu rozwiązań.
 */

#include <iostream>
#include <vector>

const char* name = "Kuba";
int experience_years = 4;

std::vector<std::string> stack = {
    "JavaScript", "React", "Node.js", 
    "Python", "C++"
};

void contact() {
    std::cout << "Email: kuba@twojdomena.pl" << std::endl;
}

// Inicjalizacja portfolio...
int main() {
    return 0;
}`;

    let i = 0;
    const speed = 30; // prędkość pisania (ms)
    const target = document.getElementById("typewriter");

    function typeWriter() {
        if (i < codeText.length) {
            // Zamiana znaków na kolory (prosty parser)
            let rawChar = codeText.charAt(i);
            target.textContent += rawChar;
            
            // Logika kolorowania po zakończeniu pisania (opcjonalnie)
            // Dla prostoty w tej wersji używamy czystego tekstu z efektem pisania
            
            i++;
            setTimeout(typeWriter, speed);
        } else {
            // Po zakończeniu pisania, sformatuj kod dla kolorów
            formatCode();
        }
    }

    function formatCode() {
        let formatted = target.textContent
            .replace(/\/\*[\s\S]*?\*\//g, '<span class="cmt">$&</span>')
            .replace(/\/\/.*/g, '<span class="cmt">$&</span>')
            .replace(/#include|const|int|char|void|return|std/g, '<span class="kwd">$&</span>')
            .replace(/"[^"]*"/g, '<span class="str">$&</span>')
            .replace(/\d+/g, '<span class="num">$&</span>')
            .replace(/main|contact|cout|endl/g, '<span class="func">$&</span>');
        
        target.innerHTML = formatted;
    }

    window.onload = typeWriter;
</script>

</body>
</html>
