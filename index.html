<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCore: Neon Clicker</title>
    <style>
        /* --- RESET I BRYŁA GŁÓWNA --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
            user-select: none;
        }

        body {
            background-color: #05050a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(at 20% 20%, rgba(0, 240, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(255, 0, 127, 0.15) 0px, transparent 50%);
        }

        /* --- BENTO GRID LAYOUT --- */
        .container {
            display: grid;
            grid-template-columns: repeat(3, 300px);
            grid-template-rows: repeat(2, 220px);
            gap: 20px;
            padding: 20px;
        }

        /* --- SZKLANY PANEL (GLASSMORPHISM) --- */
        .bento-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .bento-card:hover {
            transform: translateY(-5px);
        }

        /* Specyficzne układy kafelków Bento */
        .card-main {
            grid-row: span 2; /* Zajmuje 2 wiersze na wysokość */
            justify-content: center;
            align-items: center;
            gap: 20px;
            border-color: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.05);
        }

        /* --- ELEMENTY INTERFEJSU --- */
        .neon-text-cyan {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
        }

        .neon-text-pink {
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-desc {
            color: #8a9ba8;
            font-size: 0.9rem;
        }

        /* --- RDZEŃ DO KLIKANIA --- */
        .cyber-core {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, #0b192c 0%, #05050a 100%);
            border: 3px solid #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 15px rgba(0, 240, 255, 0.2);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #00f0ff;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .cyber-core:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.6), inset 0 0 5px rgba(0, 240, 255, 0.4);
        }

        /* --- PRZYCISKI SKLEPU --- */
        .upgrade-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .upgrade-btn:hover:not(:disabled) {
            background: #ff007f;
            border-color: #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            color: white;
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- KAfelek 1: Główny Panel (Służy do klikania) -->
        <div class="bento-card card-main">
            <div id="credits-display" class="neon-text-cyan">0 KREDYTÓW</div>
            <div id="cps-display" class="stat-desc">Generowanie: +0/s</div>
            <div class="cyber-core" id="core-button">CORE</div>
        </div>

        <!-- Kafelek 2: Sklep - Boty automatyczne -->
        <div class="bento-card">
            <div>
                <div class="neon-text-pink">AUTOPILOT</div>
                <div class="stat-desc" id="bot-count">Posiadane boty: 0</div>
            </div>
            <button class="upgrade-btn" id="buy-bot-btn">Kup Bota (Koszt: 10)</button>
        </div>

        <!-- Kafelek 3: Sklep - Siła Kliknięcia -->
        <div class="bento-card">
            <div>
                <div class="neon-text-pink">UPGRADES</div>
                <div class="stat-desc" id="click-power-display">Moc kliknięcia: 1</div>
            </div>
            <button class="upgrade-btn" id="buy-click-btn">Ulepsz Laser (Koszt: 25)</button>
        </div>

        <!-- Kafelek 4: System Rebirthów -->
        <div class="bento-card">
            <div>
                <div class="neon-text-pink">REBIRTH</div>
                <div class="stat-desc" id="rebirth-display">Poziom resetu: 0</div>
            </div>
            <button class="upgrade-btn" id="rebirth-btn" disabled>Kwantowy Reset (Koszt: 1000)</button>
        </div>

        <!-- Kafelek 5: Statystyki Ogólne -->
        <div class="bento-card">
            <div>
                <div class="neon-text-pink">STATUS</div>
                <div class="stat-desc" style="margin-top: 5px;">Mnożnik gry: <span id="multiplier-display" style="color: #fff;">1x</span></div>
                <div class="stat-desc" style="margin-top: 5px;">Baza danych: <span style="color: #00f0ff;">ONLINE</span></div>
            </div>
        </div>

    </div>

    <!-- --- LOGIKA GRY (JAVASCRIPT) --- -->
    <script>
        // Stan Gry
        let credits = 0;
        let creditsPerClick = 1;
        let creditsPerSecond = 0;
        
        let botCost = 10;
        let botCount = 0;
        
        let clickUpgradeCost = 25;
        
        let rebirths = 0;
        let rebirthCost = 1000;
        let gameMultiplier = 1;

        // Elementy DOM
        const creditsDisplay = document.getElementById('credits-display');
        const cpsDisplay = document.getElementById('cps-display');
        const coreButton = document.getElementById('core-button');
        
        const botCountDisplay = document.getElementById('bot-count');
        const buyBotBtn = document.getElementById('buy-bot-btn');
        
        const clickPowerDisplay = document.getElementById('click-power-display');
        const buyClickBtn = document.getElementById('buy-click-btn');
        
        const rebirthDisplay = document.getElementById('rebirth-display');
        const rebirthBtn = document.getElementById('rebirth-btn');
        const multiplierDisplay = document.getElementById('multiplier-display');

        // Funkcja aktualizacji UI
        function updateUI() {
            creditsDisplay.innerText = `${credits} KREDYTÓW`;
            cpsDisplay.innerText = `Generowanie: +${creditsPerSecond * gameMultiplier}/s`;
            
            botCountDisplay.innerText = `Posiadane boty: ${botCount}`;
            buyBotBtn.innerText = `Kup Bota (Koszt: ${botCost})`;
            buyBotBtn.disabled = credits < botCost;
            
            clickPowerDisplay.innerText = `Moc kliknięcia: ${creditsPerClick * gameMultiplier}`;
            buyClickBtn.innerText = `Ulepsz Laser (Koszt: ${clickUpgradeCost})`;
            buyClickBtn.disabled = credits < clickUpgradeCost;

            rebirthDisplay.innerText = `Poziom resetu: ${rebirths}`;
            rebirthBtn.innerText = `Quantum Reset (Koszt: ${rebirthCost})`;
            multiplierDisplay.innerText = `${gameMultiplier}x`;
            rebirthBtn.disabled = credits < rebirthCost;
        }

        // Kliknięcie w Rdzeń
        coreButton.addEventListener('click', () => {
            credits += creditsPerClick * gameMultiplier;
            updateUI();
        });

        // Zakup bota automatycznego
        buyBotBtn.addEventListener('click', () => {
            if (credits >= botCost) {
                credits -= botCost;
                botCount++;
                creditsPerSecond += 1;
                botCost = Math.floor(botCost * 1.5);
                updateUI();
            }
        });

        // Zakup ulepszenia kliknięcia
        buyClickBtn.addEventListener('click', () => {
            if (credits >= clickUpgradeCost) {
                credits -= clickUpgradeCost;
                creditsPerClick += 1;
                clickUpgradeCost = Math.floor(clickUpgradeCost * 1.6);
                updateUI();
            }
        });

        // Rebirth (Odrodzenie)
        rebirthBtn.addEventListener('click', () => {
            if (credits >= rebirthCost) {
                rebirths++;
                gameMultiplier = rebirths + 1;
                rebirthCost = Math.floor(rebirthCost * 2.5);
                
                // Reset postępów
                credits = 0;
                creditsPerClick = 1;
                creditsPerSecond = 0;
                botCount = 0;
                botCost = 10;
                clickUpgradeCost = 25;
                
                updateUI();
            }
        });

        // Pętla gry działająca co sekundę (dochód pasywny)
        setInterval(() => {
            if (creditsPerSecond > 0) {
                credits += creditsPerSecond * gameMultiplier;
                updateUI();
            }
        }, 1000);

        // Pierwsze uruchomienie UI
        updateUI();
    </script>
</body>
</html>
