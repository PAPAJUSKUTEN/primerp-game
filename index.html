<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f9f9f9; }
    .container { display: flex; height: 100vh; }
    
    .sidebar {
        width: 250px;
        background: linear-gradient(180deg, #2c3e50, #34495e);
        color: white;
        padding: 20px 0;
    }
    .sidebar h2 { text-align: center; font-size: 1.2rem; margin-bottom: 30px; color: #ecf0f1; }
    .sidebar ul { list-style: none; padding: 0; }
    .sidebar li {
        padding: 15px 25px;
        transition: 0.3s;
        cursor: pointer;
        border-left: 5px solid transparent;
    }
    .sidebar li:hover {
        background-color: #1a252f;
        border-left: 5px solid #3498db;
    }
    
    .content { flex-grow: 1; padding: 40px; background-color: #fff; }
    .content h1 { color: #2c3e50; }
</style>
</head>
<body>

<div class="container">
    <nav class="sidebar">
        <h2>Menu Nawigacji</h2>
        <ul>
            <li>Strona główna</li>
            <li>O nas</li>
            <li>Usługi</li>
            <li>Portfolio</li>
            <li>Aktualności</li>
            <li>Kontakt</li>
        </ul>
    </nav>
    <main class="content">
        <h1>Witaj na stronie</h1>
        <p>Wybierz jedną z zakładek po lewej stronie, aby przejść do odpowiedniej sekcji.</p>
    </main>
</div>

</body>
</html>
