<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System RP - Black & Yellow</title>
<style>
    :root {
        --bg-black: #0a0a0a;
        --accent-yellow: #fbbf24;
        --text-white: #ffffff;
        --text-gray: #a3a3a3;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; background-color: #171717; color: var(--text-white); }
    .layout { display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 280px; background: var(--bg-black); padding: 2rem; border-right: 2px solid var(--accent-yellow); }
    .sidebar h2 { color: var(--accent-yellow); font-size: 1.5rem; margin-bottom: 2rem; text-transform: uppercase; }
    .nav-list { list-style: none; padding: 0; }
    .nav-item { padding: 1rem; cursor: pointer; border-bottom: 1px solid #333; transition: 0.3s; color: var(--text-gray); }
    .nav-item:hover { color: var(--accent-yellow); padding-left: 1.5rem; }
    
    /* Main Content */
    .content-area { flex: 1; padding: 3rem; }
    .card { background: #262626; padding: 2.5rem; border-radius: 0.5rem; border-left: 4px solid var(--accent-yellow); margin-bottom: 2rem; }
    h1 { color: var(--accent-yellow); }
    .server-card { background: #171717; padding: 1.5rem; border: 1px solid #333; margin-top: 1rem; }
</style>
</head>
<body>

<div class="layout">
    <nav class="sidebar">
        <h2>Panel RP</h2>
        <ul class="nav-list">
            <li class="nav-item">Regulamin</li>
            <li class="nav-item">Informacje</li>
            <li class="nav-item">Serwery RP</li>
            <li class="nav-item">Ekipa</li>
            <li class="nav-item">Statystyki</li>
            <li class="nav-item">Kontakt</li>
        </ul>
    </nav>

    <main class="content-area">
        <div class="card">
            <h1>Regulamin</h1>
            <p>Zasady panujące na serwerze:</p>
            <ul>
                <li>Brak zachowań toksycznych.</li>
                <li>Zakaz metagamingu i powergamingu.</li>
                <li>Obowiązek przestrzegania zasad RP.</li>
            </ul>
        </div>

        <div class="card">
            <h1>Serwery RP</h1>
            <div class="server-card">
                <h3>Alpha Roleplay</h3>
                <p style="color: var(--accent-yellow);">Status: Online</p>
            </div>
        </div>
    </main>
</div>

</body>
</html>
