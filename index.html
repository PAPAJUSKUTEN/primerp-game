<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .login-box { background: #16213e; padding: 40px; border-radius: 12px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #error-msg { color: #ff4d4d; display: none; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Zaloguj się</h2>
        <div id="error-msg">Błędny login lub hasło!</div>
        <input type="text" id="username" placeholder="Login">
        <input type="password" id="password" placeholder="Hasło">
        <button onclick="checkLogin()">WEJDŹ</button>
    </div>

    <script src="auth.js"></script>
</body>
</html>
