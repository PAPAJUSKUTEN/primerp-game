<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona Główna - Klub</title>
    <style>
        /* Stylizacja wyglądu */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .btn-login {
            background-color: #ff4b2b;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background-color: #ff416c;
            transform: scale(1.05);
        }

        /* Ukryty komunikat */
        #secret-area {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #4caf50;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Witaj w Naszej Społeczności</h1>
        <p>Tylko zarejestrowani członkowie mają dostęp do panelu.</p>
        
        <button class="btn-login" onclick="loginAction()">Zaloguj się (Tylko Członkowie)</button>

        <div id="secret-area">
            <h3>Witaj, Członku!</h3>
            <p>To jest tajna treść dostępna tylko po zalogowaniu.</p>
        </div>
    </div>

    <script>
        function loginAction() {
            // Prosta symulacja logowania
            const login = prompt("Podaj hasło członka:");
            
            if (login === "tajne123") {
                alert("Zalogowano pomyślnie!");
                document.getElementById('secret-area').style.display = 'block';
            } else {
                alert("Błąd! To hasło jest nieprawidłowe.");
            }
        }
    </script>

</body>
</html>
