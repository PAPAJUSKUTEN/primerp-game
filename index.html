<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuba | Portfolio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --accent: #58a6ff;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            /* Kolory kodu */
            --kwd: #ff7b72;
            --func: #d2a8ff;
            --str: #a5d6ff;
            --cmt: #8b949e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* LEWA STRONA - INFO */
        .info-sidebar {
            width: 40%;
            background-color: var(--sidebar-bg);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid #30363d;
            box-sizing: border-box;
        }

        .info-sidebar h1 {
            font-size: 3rem;
            margin: 0;
            color: var(--accent);
        }

        .info-sidebar h2 {
            font-size: 1.2rem;
            color: var(--text-dim);
            font-weight: 400;
            margin-bottom: 30px;
        }

        .stats {
            margin-bottom: 40px;
        }

        .stat-item {
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .stat-label {
            color: var(--accent);
            font-weight: bold;
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .btn-contact {
            display: inline-block;
            padding: 12px 24px;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
            width: fit-content;
        }

        .btn-contact:hover {
            background: var(--accent);
            color: white;
        }

        /* PRAWA STRONA - KOD */
        .code-container {
            width: 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: radial-gradient(circle at center, #1c2128 0%, #0d1117 100%);
        }

        .terminal-window {
            width: 100%;
            max-width: 600px;
            background: #010409;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
            overflow: hidden;
        }

        .header {
            background: #161b22;
            padding: 10px 15px;
            display: flex;
            gap: 8px;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .content {
            padding: 20px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre;
            overflow-x: auto;
        }

        .kwd { color: var(--kwd); }
        .func { color: var(--func); }
        .str { color: var(--str); }
        .cmt { color: var(--cmt); }

        #typewriter::after {
            content: "_";
            animation: blink 1s infinite;
            color: var(--accent);
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Responsywność */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            .info-sidebar, .code-container { width: 100%; padding: 30px; }
            .info-sidebar { height: auto; }
        }
    </style>
</head>
<body>

    <!-- LEWA SEKCJA -->
    <aside class="info-sidebar">
        <h1>Kuba</h1>
        <h2>Software Developer</h2>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Doświadczenie</span>
                4 lata w branży IT
            </div>
            <div class="stat-item">
                <span class="stat-label">Główny Stack</span>
                JS, React, Node.js, Python, C++
            </div>
            <div class="stat-item">
                <span class="stat-label">Lokalizacja</span>
                Polska / Remote
            </div>
        </div>

        <a href="mailto:kuba@example.com" class="btn-contact">Napisz do mnie</a>
    </aside>

    <!-- PRAWA SEKCJA -->
    <main class="code-container">
        <div class="terminal-window">
            <div class="header">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="content" id="typewriter"></div>
        </div>
    </main>

<script>
    const codeText = `class Developer {
  constructor() {
    this.name = "Kuba";
    this.exp = "4 years";
  }

  getSkills() {
    return [
      "JavaScript", "React", 
      "Node.js", "Python", "C++"
    ];
  }

  isReady() {
    return true; 
  }
}

// Inicjalizacja...
const me = new Developer();`;

    let i = 0;
    const target = document.getElementById("typewriter");

    function typeWriter() {
        if (i < codeText.length) {
            target.textContent += codeText.charAt(i);
            i++;
            setTimeout(typeWriter, 25);
        } else {
            formatCode();
        }
    }

    function formatCode() {
        let html = target.textContent
            .replace(/class|constructor|this|return|new|const/g, '<span class="kwd">$&</span>')
            .replace(/getSkills|isReady/g, '<span class="func">$&</span>')
            .replace(/"[^"]*"/g, '<span class="str">$&</span>')
            .replace(/\/\/ .*/g, '<span class="cmt">$&</span>');
        target.innerHTML = html;
    }

    window.onload = typeWriter;
</script>

</body>
</html>
