<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeRP | Logowanie</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="background-image"></div>
        <div class="overlay"></div>

        <div class="login-container">
            <div class="login-box">
                <div class="logo-section">
                    <img src="https://i.postimg.cc/KvFkh5QV/a4324af6-1492-4782-b7b6-db9eeb0833bf-(1).webp" alt="Logo" class="login-logo">
                    <h1>PRIME<span>RP</span></h1>
                    <p class="season-tag">SEZON 2</p>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="Login" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Hasło" required>
                    </div>
                    
                    <button type="submit" class="btn-login">ZALOGUJ SIĘ</button>
                </form>

                <div class="login-footer">
                    <p>Nie masz konta? <a href="#">Zarejestruj się</a></p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
