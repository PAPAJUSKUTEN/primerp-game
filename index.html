<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUBA | HACKER CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000a00; /* Bardzo ciemna zieleń/czerń */
            --terminal-bg: rgba(0, 15, 0, 0.9);
            --accent: #00ff41; /* Klasyczny Matrix Green */
            --accent-dim: rgba(0, 255, 65, 0.2);
            --text: #00ff41;
            --discord: #5865F2;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            overflow: hidden;
        }

        /* EFEKT CRT (SKANOWANIE) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 5;
        }

        .sidebar {
            display: grid;
            grid-template-rows: auto auto auto 1fr auto;
            gap: 15px;
        }

        .card {
            background: var(--terminal-bg);
            border: 1px solid var(--accent);
            border-radius: 4px;
            padding: 20px;
            box-shadow: 0 0 10px var(--accent-dim);
            position: relative;
        }

        .profile h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0; font-size: 1.8rem;
            text-shadow: 0 0 10px var(--accent);
        }

        .tag {
            font-size: 10px;
            border: 1px solid var(--accent);
            padding: 2px 8px;
            margin-top: 10px;
            display: inline-block;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* MUZYKA HAKERSKA */
        .music-card {
            cursor: pointer;
            background: rgba(0, 255, 65, 0.05);
            text-align: center;
        }
        .music-card:hover { background: var(--accent); color: #000; }

        /* DISCORD GLITCH */
        .discord-card {
            border-color: var(--discord);
            color: var(--discord);
            cursor: pointer;
            text-align: center;
        }
        .discord-card:hover {
            box-shadow: 0 0 20px var(--discord);
            background: var(--discord);
            color: #fff;
        }

        /* TERMINAL */
        .terminal-container {
            border: 1px solid var(--accent);
            background: var(--terminal-bg);
            display: flex; flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* MATRIX FALLING CODE BG */
        #matrix-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.15;
            pointer-events: none;
        }

        .terminal-header {
            padding: 10px;
            background: var(--accent);
            color: #000;
            font-weight: bold;
            display: flex; justify-content: space-between;
            font-size: 12px;
        }

        .terminal-body {
            padding: 30px;
            font-size: 14px;
            line-height: 1.6;
            overflow-y: auto;
            position: relative;
            z-index: 2;
        }

        .code-keyword { color: #fff; font-weight: bold; }
        .code-string { color: #888; }
        
        .tech-item {
            font-size: 12px;
            margin-right: 10px;
            text-decoration: underline;
        }

        #youtube-player { position: absolute; width: 0; height: 0; opacity: 0; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>
<div id="youtube-player"></div>

<div class="container">
    <aside class="sidebar">
        <div class="card profile">
            <h1>KUBA_ROOT</h1>
            <div class="tag">ACCESS_GRANTED: 4_YEARS_EXP</div>
            <p style="font-size: 0.8rem; margin-top: 15px; color: #008f11;">SYSTEM: JS | REACT | PYTHON | C++</p>
        </div>

        <div class="card music-card" onclick="toggleMusic()">
            <div style="font-weight: bold;">[ NACIŚNIJ NA MNIE ]</div>
            <div id="musicStatus" style="font-size: 10px;">PLAY_HACKER_ATMOSPHERE.mp3</div>
        </div>

        <div class="card">
            <div style="font-size: 12px; margin-bottom: 10px;">> SKILLS_MANIFEST:</div>
            <span class="tech-item">JS</span><span class="tech-item">Node</span>
            <span class="tech-item">C++</span><span class="tech-item">React</span>
        </div>

        <div class="card discord-card" onclick="copyDiscord()">
            <div style="font-size: 10px;">ESTABLISH_CONNECTION</div>
            <div style="font-weight: bold;" id="discordNick">kubasruba0713_0</div>
            <div id="copyHint" style="font-size: 9px; margin-top: 5px;">[ CLICK TO COPY NICK ]</div>
        </div>
    </aside>

    <main class="terminal-container">
        <div class="terminal-header">
            <span>TERMINAL_V.4.0.1 - SESSION: ACTIVE</span>
            <span>USER: KUBA</span>
        </div>
        <div class="terminal-body" id="code"></div>
    </main>
</div>

<script>
    // Matrix Rain Effect
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 10, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff41";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = characters.charAt(Math.floor(Math.random() * characters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    // Copy Discord
    function copyDiscord() {
        navigator.clipboard.writeText("kubasruba0713_0");
        const hint = document.getElementById('copyHint');
        hint.innerText = "NICK_COPIED_TO_CLIPBOARD";
        setTimeout(() => hint.innerText = "[ CLICK TO COPY NICK ]", 2000);
    }

    // YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            videoId: '3GnwNV72UbE',
            playerVars: { 'loop': 1, 'playlist': '3GnwNV72UbE' }
        });
    }

    let isPlaying = false;
    function toggleMusic() {
        if (!isPlaying) {
            player.playVideo();
            document.getElementById('musicStatus').innerText = "AUDIO_FEED: STREAMING";
            isPlaying = true;
        } else {
            player.pauseVideo();
            document.getElementById('musicStatus').innerText = "AUDIO_FEED: PAUSED";
            isPlaying = false;
        }
    }

    // Typewriter
    const codeText = `> INITIALIZING KUBA_KERNEL...
> LOADING LIBS: [JS, REACT, CPP, PYTHON]
> STATUS: 4 YEARS OF CODING_EXPERIENCE
> ENCRYPTING CONNECTION...

class HackerKuba {
    constructor() {
        this.user = "kubasruba0713_0";
        this.capabilities = ["Pentesting", "DevOps", "Fullstack"];
    }

    async runWorld() {
        while(true) {
            await this.code();
            await this.improve();
        }
    }
}

// System ready. _`;

    let i = 0;
    function type() {
        if (i < codeText.length) {
            document.getElementById("code").textContent += codeText.charAt(i);
            i++;
            setTimeout(type, 20);
        } else {
            const el = document.getElementById("code");
            let html = el.textContent
                .replace(/(class|constructor|this|async|await|while|true|const)/g, '<span class="code-keyword">$1</span>')
                .replace(/(\".*\")/g, '<span class="code-string">$1</span>');
            el.innerHTML = html;
        }
    }
    window.onload = type;
</script>

</body>
</html>
