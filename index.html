<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameScripts Hub | Moje Skrypty do Gier</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --accent: #00ffcc;
            --card: #1a1a2e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #e0e0ff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 2rem 0;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        h1 {
            font-size: 3rem;
            color: var(--accent);
        }

        .subtitle {
            color: #a0a0cc;
            margin-top: 0.5rem;
        }

        nav {
            background: #16213e;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #334;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            background: #1e1e38;
            border: 2px solid #334;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .project-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334;
            transition: all 0.3s;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(0, 255, 204, 0.2);
            border-color: var(--accent);
        }

        .card-header {
            height: 180px;
            background: linear-gradient(45deg, #00ccaa, #009988);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
        }

        .card-body {
            padding: 1.5rem;
        }

        .project-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .tech {
            color: #88ffdd;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .description {
            color: #b0b0cc;
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 10px 24px;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--accent);
            color: #0f0f1a;
        }

        footer {
            text-align: center;
            padding: 3rem 0;
            color: #556;
            border-top: 1px solid #223;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>GameScripts Hub</h1>
        <p class="subtitle">Moja kolekcja skryptów, mechanik i małych gier</p>
    </header>

    <nav>
        <div class="nav-container">
            <input type="text" class="search-bar" placeholder="Szukaj skryptu lub mechaniki... (np. inventory, combat, procedural)">
            <div>
                <button class="btn" onclick="addNewProject()">+ Dodaj nowy skrypt</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 1.5rem; color: #ddd;">Moje Projekty</h2>
        
        <div class="projects-grid" id="projectsGrid">
            <!-- Przykładowe karty - możesz edytować -->
        </div>
    </div>

    <footer>
        <p>GameScripts Hub © 2026 • Wszystkie skrypty są open-source do Twojego użytku</p>
    </footer>

    <script>
        const projects = [
            {
                title: "Zaawansowany System Inventory",
                emoji: "🎒",
                tech: "JavaScript • HTML5 Canvas",
                desc: "Przeciąganie przedmiotów, stacki, kategorie, zapis w localStorage",
                link: "#"
            },
            {
                title: "Combat System z Turami",
                emoji: "⚔️",
                tech: "Phaser 3",
                desc: "System walki turowej z buffami, debuffami i animacjami",
                link: "#"
            },
            {
                title: "Proceduralna Generacja LoD",
                emoji: "🌲",
                tech: "JavaScript",
                desc: "Generowanie poziomów roguelike z algorytmem BSP",
                link: "#"
            },
            {
                title: "Dialog System z Gałęziami",
                emoji: "💬",
                tech: "JavaScript",
                desc: "Zaawansowany system dialogów z warunkami i relacjami NPC",
                link: "#"
            },
            {
                title: "Platformer Controller",
                emoji: "🏃",
                tech: "Godot 4 / JavaScript",
                desc: "Płynny kontroler z coyote time, jump buffer i wall jump",
                link: "#"
            }
        ];

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = '';

            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <div class="card-header">${project.emoji}</div>
                    <div class="card-body">
                        <div class="project-title">${project.title}</div>
                        <div class="tech">${project.tech}</div>
                        <div class="description">${project.desc}</div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn" onclick="viewDemo('${project.title}')">Zobacz Demo</button>
                            <button class="btn" onclick="downloadScript('${project.title}')">Pobierz .js</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function viewDemo(title) {
            alert(`Otwieram demo: ${title}\n\n(W rzeczywistości tutaj będzie link do live demo)`);
        }

        function downloadScript(title) {
            alert(`Pobieranie skryptu: ${title}.js\n\n(Tutaj wstawisz prawdziwy download)`);
        }

        function addNewProject() {
            const title = prompt("Nazwa skryptu/mechaniki:");
            if (title) {
                alert(`Nowy projekt "${title}" dodany! (Edytuj kod JS żeby dodać prawdziwą kartę)`);
                // Tutaj możesz dodać logikę dodawania nowego projektu
            }
        }

        // Uruchomienie
        window.onload = renderProjects;
    </script>
</body>
</html>
