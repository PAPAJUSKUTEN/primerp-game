<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeRP | Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://i.postimg.cc/KvFkh5QV/a4324af6-1492-4782-b7b6-db9eeb0833bf-(1).webp" alt="Logo" class="side-logo">
            <h2 class="brand">PRIME<span>RP</span></h2>
        </div>

        <nav class="side-nav">
            <a href="#" class="nav-item active" data-target="dashboard">
                <i class="fas fa-th-large"></i> <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-target="coming-soon">
                <i class="fas fa-rocket"></i> <span>Sezon 2</span>
            </a>
            <a href="#" class="nav-item" data-target="coming-soon">
                <i class="fas fa-file-invoice"></i> <span>Regulamin</span>
            </a>
            <a href="#" class="nav-item" data-target="coming-soon">
                <i class="fas fa-user-shield"></i> <span>Założyciel</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <p>Założyciel: !Kuba</p>
        </div>
    </aside>

    <main class="main-content">
        
        <section id="dashboard" class="tab-page active">
            <header class="content-header">
                <h1>Panel Główny</h1>
                <p>Status: <span class="status-online">ONLINE</span></p>
            </header>

            <div class="info-grid">
                <div class="info-card">
                    <h3>KOD DO GRY</h3>
                    <p class="promo-val">10cap1up</p>
                    <button class="btn-copy" onclick="copyCode()">KOPIUJ KOD</button>
                </div>
            </div>
        </section>

        <section id="coming-soon" class="tab-page">
            <div class="coming-soon-container">
                <i class="fas fa-clock fa-4x"></i>
                <h1>WKRÓTCE...</h1>
                <p>Ta sekcja zostanie odblokowana wraz ze startem Sezonu 2 PrimeRP.</p>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
