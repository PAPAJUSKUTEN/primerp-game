<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ALERTU RCB - Czuwanie</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Stylistyka RCB: Agresywna, czytelna, ostrzegawcza */
        :root {
            --rcb-bg: #000000;
            --rcb-accent: #ff0000; /* Czerwień ostrzegawcza */
            --rcb-text: #ffffff;
            --rcb-subtext: #aaaaaa;
            --rcb-ui: #222222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--rcb-bg); 
            color: var(--rcb-text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Ekran STARTOWY (Czuwania) */
        #ekran-czuwania {
            text-align: center;
            transition: opacity 0.5s;
        }

        .rcb-logo-big {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -2px;
            color: var(--rcb-accent);
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            background: var(--rcb-ui);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--rcb-subtext);
            margin-bottom: 40px;
        }
        .status-badge.active { color: #00ff00; border: 1px solid #00ff00; }

        .btn-aktywacja {
            background-color: var(--rcb-accent);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            transition: 0.2s;
        }
        .btn-aktywacja:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }

        /* Pełnoekranowy ALERT */
        #alert-rcb {
            display: none; /* Ukryty domyślnie */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--rcb-bg); 
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Agresywna ramka RCB */
        .alert-content {
            background: white;
            color: black;
            width: 100%;
            max-width: 800px;
            border: 20px solid var(--rcb-accent);
            padding: 50px;
            text-align: center;
            animation: pulse-border 1.5s infinite;
        }

        .alert-header {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--rcb-accent);
        }

        .alert-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 30px;
            line-height: 1;
            text-transform: uppercase;
        }

        .alert-text {
            font-size: 1.5rem;
            margin-bottom: 40px;
            font-weight: 400;
            color: #111;
        }

        .btn-zamknij {
            background-color: #000;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Animacja pulsowania ramki */
        @keyframes pulse-border {
            0% { border-color: var(--rcb-accent); }
            50% { border-color: #550000; }
            100% { border-color: var(--rcb-accent); }
        }
    </style>
</head>
<body>

    <div id="ekran-czuwania">
        <div class="rcb-logo-big">ALERT RCB</div>
        <div id="status" class="status-badge">System nieaktywny</div>
        <br>
        <button id="btn-start" class="btn-aktywacja" onclick="aktywujSystem()">Aktywuj System</button>
        <p style="color: var(--rcb-subtext); margin-top: 20px; font-size: 0.8rem;">Wymagana interakcja dla dźwięku.</p>
    </div>

    <div id="alert-rcb">
        <div class="alert-content">
            <div class="alert-header">Rządowe Centrum Bezpieczeństwa</div>
            <h1 class="alert-title">KOMUNIKAT PILNY</h1>
            <p class="alert-text">Uwaga! Uruchomiono zaplanowaną procedurę systemową. Prosimy o pozostanie w gotowości i śledzenie dalszych komunikatów.</p>
            <button class="btn-zamknij" onclick="zamknijAlert()">Potwierdzam odbiór</button>
        </div>
    </div>

    <script>
        // --- KONFIGURACJA CZASU ALERTU ---
        const GODZINA = 16;  // Godzina (24h)
        const MINUTA = 30;   // Minuta
        // ---------------------------------

        let systemAktywny = false;
        let alertUruchomiony = false;

        // Funkcja aktywująca nasłuchiwanie czasu
        function aktywujSystem() {
            systemAktywny = true;
            
            // Zmiana interfejsu
            document.getElementById('status').innerText = "Czuwanie aktywne";
            document.getElementById('status').classList.add('active');
            document.getElementById('btn-start').innerText = "W gotowości...";
            document.getElementById('btn-start').style.opacity = '0.5';
            document.getElementById('btn-start').disabled = true;

            // Uruchomienie pętli sprawdzającej czas
            setInterval(sprawdzCzas, 1000); // Co sekundę
            console.log("System RCB aktywowany. Oczekiwanie na " + GODZINA + ":" + MINUTA);
        }

        function sprawdzCzas() {
            if (!systemAktywny || alertUruchomiony) return;

            const teraz = new Date();
            if (teraz.getHours() === GODZINA && teraz.getMinutes() === MINUTA) {
                odpalAlert();
            }
        }

        function odpalAlert() {
            alertUruchomiony = true;
            
            // Wyświetl alert
            document.getElementById('ekran-czuwania').style.opacity = '0';
            document.getElementById('alert-rcb').style.display = 'flex';
            
            // Odtwórz agresywny dźwięk (Beep alarmowy)
            const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            audio.loop = true; // Zapętl dźwięk
            audio.play().catch(e => console.log("Przeglądarka zablokowała autoodtwarzanie. Wymagana wcześniejsza interakcja."));
            
            // Zapisz audio w oknie, by móc je wyłączyć
            window.currentAlarmAudio = audio;
        }

        function zamknijAlert() {
            document.getElementById('alert-rcb').style.display = 'none';
            document.getElementById('ekran-czuwania').style.opacity = '1';
            
            // Wyłącz dźwięk
            if(window.currentAlarmAudio) {
                window.currentAlarmAudio.pause();
            }
        }
    </script>

</body>
</html>
