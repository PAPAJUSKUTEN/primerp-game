<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zakładki po lewej</title>
  <style>
    :root{
      --bg:#060606;
      --panel:#0b0b0b;
      --btn:#111111;
      --btn2:#151515;
      --text:#a8a8a8;
      --text-dark:#1b1b1b;
      --gold:#f4b61f;
      --gold2:#ffcf57;
      --shadow:rgba(0,0,0,.6);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(244,182,31,.10), transparent 30%),
        linear-gradient(180deg, #090909 0%, #040404 100%);
      font-family: Arial, Helvetica, sans-serif;
      color:#fff;
    }

    .layout{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width: 320px;
      padding: 22px 18px;
      background: linear-gradient(180deg, rgba(10,10,10,.98), rgba(6,6,6,.98));
      border-right: 1px solid rgba(255,255,255,.05);
      box-shadow: 10px 0 30px var(--shadow);
    }

    .title{
      text-align:center;
      color: var(--gold);
      font-weight: 900;
      letter-spacing: .55em;
      font-size: 15px;
      margin-bottom: 22px;
      text-shadow: 0 0 14px rgba(244,182,31,.18);
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap: 14px;
    }

    .tab{
      width:100%;
      min-height: 68px;
      border:none;
      border-radius: 18px;
      background: linear-gradient(180deg, #121212, #0d0d0d);
      color: var(--text);
      display:flex;
      align-items:center;
      gap:14px;
      padding: 0 18px;
      cursor:pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 10px 20px rgba(0,0,0,.35);
      transition: .2s ease;
      text-align:left;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-weight: 800;
    }

    .tab:hover{
      transform: translateY(-1px);
      background: linear-gradient(180deg, #171717, #101010);
      color:#d2d2d2;
    }

    .tab.active{
      background: linear-gradient(180deg, var(--gold2), var(--gold));
      color: #111;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06),
        0 12px 24px rgba(244,182,31,.18),
        0 0 18px rgba(244,182,31,.10);
    }

    .icon{
      width:22px;
      text-align:center;
      font-size:18px;
      flex:0 0 22px;
    }

    .main{
      flex:1;
      padding: 26px;
    }

    .card{
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 18px;
      padding: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
      min-height: 220px;
    }

    .card h1{
      font-size: 28px;
      margin-bottom: 12px;
    }

    .card p{
      color:#b7b7b7;
      line-height:1.6;
      font-size: 15px;
      max-width: 700px;
    }

    @media (max-width: 820px){
      .layout{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,.05);
      }

      .menu{
        display:grid;
        grid-template-columns: 1fr;
      }

      .main{
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="title">PROJECT</div>

      <div class="menu">
        <button class="tab active" onclick="openTab(this, 'O nas / Nowości', 'Tutaj możesz dać opis serwera, aktualności i najważniejsze informacje.')">
          <span class="icon">🏠</span>
          <span>O NAS / NOWOŚCI</span>
        </button>

        <button class="tab" onclick="openTab(this, 'Mapa sektorów', 'Tu możesz wstawić mapę sektorów i stref.')">
          <span class="icon">🗺️</span>
          <span>MAPA SEKTORÓW</span>
        </button>

        <button class="tab" onclick="openTab(this, 'Administracja', 'Sekcja administracji, kontakt do osób odpowiedzialnych.')">
          <span class="icon">🛡️</span>
          <span>ADMINISTRACJA</span>
        </button>

        <button class="tab" onclick="openTab(this, 'Regulamin serwera', 'Tu możesz wkleić regulamin i zasady.')">
          <span class="icon">📜</span>
          <span>REGULAMIN SERWERA</span>
        </button>

        <button class="tab" onclick="openTab(this, 'Centrum zgłoszeń', 'W tym miejscu dodaj formularz zgłoszeń i odwołań.')">
          <span class="icon">🐞</span>
          <span>CENTRUM ZGŁOSZEŃ</span>
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="card">
        <h1 id="title">O nas / Nowości</h1>
        <p id="desc">Tutaj możesz dać opis serwera, aktualności i najważniejsze informacje.</p>
      </div>
    </main>
  </div>

  <script>
    function openTab(btn, title, desc){
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('title').textContent = title;
      document.getElementById('desc').textContent = desc;
    }
  </script>
</body>
</html>
