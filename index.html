<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gaming Clans - Portal</title>
    <style>
        /* KOMPLETNY ARKUSZ STYLÓW CSS */
        :root {
            --bg-color: #0f1014;
            --sidebar-color: #1a1c23;
            --accent-color: #7289da;
            --text-main: #ffffff;
            --text-dim: #a3a6aa;
            --card-bg: #23272a;
            --hover-color: #2c2f33;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* LEWY PASEK BOCZNY - LISTA GIER */
        aside {
            width: 300px;
            background-color: var(--sidebar-color);
            border-right: 1px solid #2f3136;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            border-bottom: 1px solid #2f3136;
        }

        #game-list {
            list-style: none;
            padding: 10px;
            margin: 0;
            overflow-y: auto;
        }

        .game-item {
            padding: 15px 20px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }

        .game-item:hover {
            background-color: var(--hover-color);
        }

        .game-item.active {
            background-color: var(--accent-color);
            box-shadow: 0 4px 15px rgba(114, 137, 218, 0.3);
        }

        .game-icon {
            width: 35px;
            height: 35px;
            background: #4f545c;
            border-radius: 6px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        /* PRAWY PANEL - LISTA KLANÓW */
        main {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #1e2124, #0f1014);
        }

        .view-header {
            margin-bottom: 40px;
        }

        .view-header h2 {
            font-size: 2.5rem;
            margin: 0;
        }

        .view-header p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .clan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .clan-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #2f3136;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .clan-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .clan-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .clan-meta {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .clan-description {
            line-height: 1.6;
            color: #dcddde;
        }

        .tag {
            display: inline-block;
            background: #4f545c;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 15px;
            margin-right: 5px;
        }

        /* SCROLLBAR CUSTOMIZATION */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #2f3136; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
    </style>
</head>
<body>

    <aside>
        <div class="sidebar-header">Gry Online</div>
        <ul id="game-list">
            </ul>
    </aside>

    <main id="content-area">
        <div id="view-welcome">
            <div class="view-header">
                <h2>Witaj w Bazie Klanów</h2>
                <p>Wybierz grę z listy po lewej stronie, aby zobaczyć aktywne klany i dywizje.</p>
            </div>
        </div>
        <div id="clan-display" style="display: none;">
            <div class="view-header">
                <h2 id="current-game-title">Nazwa Gry</h2>
                <p id="current-game-desc">Opis środowiska klanowego dla tej produkcji.</p>
            </div>
            <div class="clan-grid" id="clan-container">
                </div>
        </div>
    </main>

    <script>
        // BAZA DANYCH - Pełna struktura obiektowa
        const gamesData = [
            {
                id: 1,
                name: "Counter-Strike 2",
                desc: "Największa scena e-sportowa klanów taktycznych.",
                clans: [
                    { name: "Virtus.pro", members: 150, leader: "Pasha", desc: "Legendarna formacja z ogromnym doświadczeniem.", tags: ["Pro", "Tactical"] },
                    { name: "G2 Esports", members: 89, leader: "NiKo", desc: "Agresywny styl gry i międzynarodowy skład.", tags: ["Global", "Aggressive"] },
                    { name: "Polish Eagles", members: 45, leader: "Orzeł", desc: "Lokalna społeczność skupiona na treningach i turniejach krajowych.", tags: ["PL", "Community"] }
                ]
            },
            {
                id: 2,
                name: "League of Legends",
                desc: "Zespoły rywalizujące na Summoner's Rift.",
                clans: [
                    { name: "T1", members: 200, leader: "Faker", desc: "Wielokrotni mistrzowie świata, dyscyplina i strategia.", tags: ["Elite", "KR"] },
                    { name: "Fnatic", members: 120, leader: "Rekkles", desc: "Europejska potęga z wieloletnią tradycją.", tags: ["EU", "Classic"] }
                ]
            },
            {
                id: 3,
                name: "World of Warcraft",
                desc: "Gildie rajdowe i PVP.",
                clans: [
                    { name: "Liquid", members: 350, leader: "Max", desc: "Gildia nastawiona na World First Race. Hardkorowy raiding.", tags: ["Raiding", "Hardcore"] },
                    { name: "Echo", members: 310, leader: "Scripe", desc: "Topowa gildia europejska, dominatorzy PVE.", tags: ["PVE", "Elite"] },
                    { name: "Srebrna Lanca", members: 80, leader: "Arthas", desc: "Polska gildia social/leveling z ambicjami na mythic.", tags: ["Social", "PL"] }
                ]
            },
            {
                id: 4,
                name: "Valorant",
                desc: "Dywizje klanowe w shooterze od Riot Games.",
                clans: [
                    { name: "Sentinels", members: 60, leader: "TenZ", desc: "Ikona amerykańskiego Valoranta.", tags: ["NA", "E-sport"] },
                    { name: "Navi", members: 45, leader: "Shao", desc: "Strategiczne podejście i niesamowita celność.", tags: ["CIS", "Tactical"] }
                ]
            }
        ];

        // LOGIKA OPERACYJNA SILNIKA STRONY
        const gameListElement = document.getElementById('game-list');
        const welcomeScreen = document.getElementById('view-welcome');
        const clanDisplay = document.getElementById('clan-display');
        const clanContainer = document.getElementById('clan-container');
        const gameTitle = document.getElementById('current-game-title');
        const gameDesc = document.getElementById('current-game-desc');

        function init() {
            gamesData.forEach(game => {
                const li = document.createElement('li');
                li.className = 'game-item';
                li.innerHTML = `
                    <div class="game-icon">${game.name.charAt(0)}</div>
                    <span>${game.name}</span>
                `;
                li.onclick = () => selectGame(game, li);
                gameListElement.appendChild(li);
            });
        }

        function selectGame(game, element) {
            // Zarządzanie stanem aktywności w menu
            document.querySelectorAll('.game-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // Przełączanie widoków
            welcomeScreen.style.display = 'none';
            clanDisplay.style.display = 'block';

            // Aktualizacja nagłówków
            gameTitle.innerText = game.name;
            gameDesc.innerText = game.desc;

            // Renderowanie klanów
            clanContainer.innerHTML = '';
            game.clans.forEach(clan => {
                const card = document.createElement('div');
                card.className = 'clan-card';
                
                let tagsHtml = clan.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

                card.innerHTML = `
                    <div class="clan-name">${clan.name}</div>
                    <div class="clan-meta">
                        <span>Lider: <strong>${clan.leader}</strong></span>
                        <span>Członkowie: ${clan.members}</span>
                    </div>
                    <div class="clan-description">${clan.desc}</div>
                    <div class="clan-tags">${tagsHtml}</div>
                `;
                clanContainer.appendChild(card);
            });
        }

        // Uruchomienie skryptu po załadowaniu DOM
        window.onload = init;
    </script>
</body>
</html>
