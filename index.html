<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUBA | Dev Core 2030</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --text: #e0e0e0;
            --text-dim: #808080;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* LEWA STRONA - BENTO INFO */
        .sidebar {
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .profile h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tag {
            display: inline-block;
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            text-align: center;
        }

        .stat-val { font-size: 24px; font-weight: 700; color: #fff; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

        .tech-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-item {
            font-size: 14px;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 12px;
        }

        /* PRAWA STRONA - TERMINAL */
        .terminal-container {
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            padding: 15px 25px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-controls { display: flex; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #333; }

        .terminal-body {
            padding: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            line-height: 1.8;
            overflow-y: auto;
        }

        .code-keyword { color: #ff7b72; }
        .code-func { color: #d2a8ff; }
        .code-string { color: #a5d6ff; }
        .code-comment { color: #6a737d; font-style: italic; }

        /* ANIMACJA POŚWIATY */
        .glow {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(0, 242, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
            .sidebar { height: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- LEWA STRONA -->
    <aside class="sidebar">
        <div class="card profile">
            <h1>Kuba.dev</h1>
            <span class="tag">SENIOR ARCHITECT</span>
            <p style="color: var(--text-dim); margin-top: 15px;">Buduję systemy jutra przy użyciu dzisiejszego kodu.</p>
        </div>

        <div class="card stats-grid">
            <div class="stat-card">
                <div class="stat-val">4+</div>
                <div class="stat-label">Lata exp</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">∞</div>
                <div class="stat-label">Pasja</div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0">Tech Stack</h3>
            <div class="tech-list">
                <span class="tech-item">C++</span>
                <span class="tech-item">React 22</span>
                <span class="tech-item">Node.js</span>
                <span class="tech-item">Python 3.x</span>
                <span class="tech-item">Next.js</span>
            </div>
        </div>

        <div class="card" style="background: var(--accent); color: #000; font-weight: bold; text-align: center; cursor: pointer;">
            ZAINICJUJ KONTAKT
        </div>
    </aside>

    <!-- PRAWA STRONA -->
    <main class="terminal-container">
        <div class="glow"></div>
        <div class="terminal-header">
            <div class="window-controls">
                <div class="dot" style="background: #ff5f56;"></div>
                <div class="dot" style="background: #ffbd2e;"></div>
                <div class="dot" style="background: #27c93f;"></div>
            </div>
            <span style="font-size: 12px; opacity: 0.5;">main_kernel.cpp</span>
        </div>
        <div class="terminal-body" id="code"></div>
    </main>
</div>

<script>
    const code = `// System Diagnostic v4.0.2
#include <iostream>
#include <vector>

class Developer {
    std::string name = "Kuba";
    int xp = 4; // years in matrix

public:
    void renderSkills() {
        std::vector<std::string> stack = {
            "JavaScript", "React", "Node.js", "Python", "C++"
        };
        for(auto const& skill : stack) {
            connect_to_knowledge_base(skill);
        }
    }

    bool is_available() {
        return true; // system ready for deployment
    }
};

// Start initialization...
int main() {
    Developer kuba;
    if(kuba.is_available()) {
        kuba.renderSkills();
        std::cout << "Status: Online" << std::endl;
    }
    return 0;
}`;

    let i = 0;
    function type() {
        if (i < code.length) {
            document.getElementById("code").textContent += code.charAt(i);
            i++;
            setTimeout(type, 15);
        } else {
            format();
        }
    }

    function format() {
        const el = document.getElementById("code");
        let text = el.textContent;
        text = text.replace(/(#include|class|int|void|public|bool|return|for|auto)/g, '<span class="code-keyword">$1</span>');
        text = text.replace(/(\".*\")/g, '<span class="code-string">$1</span>');
        text = text.replace(/(\/\/.*)/g, '<span class="code-comment">$1</span>');
        text = text.replace(/(renderSkills|is_available|main|cout)/g, '<span class="code-func">$1</span>');
        el.innerHTML = text;
    }

    window.onload = type;
</script>

</body>
</html>
