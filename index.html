<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moja strona</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      max-width: 600px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: #38bdf8;
    }

    a {
      color: #f8fafc;
      text-decoration: none;
      background: #2563eb;
      padding: 10px 16px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 16px;
    }

    a:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Witaj na mojej stronie</h1>
    <p>To jest prosta strona HTML z podstawowym stylem CSS.</p>
    <a href="#">Kliknij mnie</a>
  </main>
</body>
</html>
