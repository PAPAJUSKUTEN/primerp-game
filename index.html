<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Gracza</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Portal Gracza</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#login">Zaloguj się</a></li>
            <li><a href="#register">Zarejestruj się</a></li>
            <li><a href="#dashboard">Panel kontrolny</a></li>
        </ul>
    </nav>
    <section id="login">
        <h2>Zaloguj się</h2>
        <form action="/login" method="post">
            <label for="username">Nazwa użytkownika:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Hasło:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Zaloguj</button>
        </form>
    </section>
    <section id="register">
        <h2>Zarejestruj się</h2>
        <form action="/register" method="post">
            <label for="username">Nazwa użytkownika:</label>
            <input type="text" id="username" name="username" required>
            <label for="email">Adres e-mail:</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Hasło:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Zarejestruj</button>
        </form>
    </section>
    <section id="dashboard">
        <h2>Panel kontroli</h2>
        <p>Witaj w Twoim panelu kontroli. Oto Twoje informacje:</p>
        <p><strong>Nazwa użytkownika:</strong> {{username}}</p>
        <p><strong>Email:</strong> {{email}}</p>
        <a href="/logout">Wyloguj się</a>
    </section>
    <footer>
        <p>&copy; 2023 Portal Gracza</p>
    </footer>
</body>
</html>
