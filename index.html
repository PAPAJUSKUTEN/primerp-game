<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<style>
    .container {
        display: flex;
        align-items: flex-start;
    }
    .sidebar {
        width: 200px;
        border-right: 1px solid #ccc;
        padding-right: 20px;
    }
    .sidebar ul {
        list-style-type: none;
        padding: 0;
    }
    .sidebar li {
        margin-bottom: 10px;
        padding: 10px;
        background-color: #f4f4f4;
        cursor: pointer;
    }
    .sidebar li:hover {
        background-color: #ddd;
    }
    .content {
        padding-left: 20px;
    }
</style>
</head>
<body>

<div class="container">
    <nav class="sidebar">
        <ul>
            <li>Zakładka 1</li>
            <li>Zakładka 2</li>
            <li>Zakładka 3</li>
            <li>Zakładka 4</li>
            <li>Zakładka 5</li>
            <li>Zakładka 6</li>
        </ul>
    </nav>
    <main class="content">
        <h1>Zawartość</h1>
        <p>Tutaj pojawi się treść wybranej zakładki.</p>
    </main>
</div>

</body>
</html>
