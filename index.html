<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ALARMOWY</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: #ff0000;
            overflow: hidden;
        }

        /* Stylizacja ramki alarmowej */
        .alarm-container {
            text-align: center;
            padding: 60px;
            border: 10px double #ff0000;
            background: linear-gradient(0deg, #1a0000 0%, #000 100%);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Stylizacja przycisku */
        #controlBtn {
            background: #ff0000;
            color: #000;
            border: none;
            padding: 25px 70px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 15px #ff0000;
        }

        #controlBtn:hover {
            background: #fff;
            box-shadow: 0 0 30px #fff;
            transform: scale(1.05);
        }

        #controlBtn:disabled {
            background: #333;
            color: #555;
            box-shadow: none;
            cursor: wait;
        }

        /* Ukryty odtwarzacz YouTube */
        #yt-audio-element {
            position: absolute;
            top: -9999px;
            left: -9999px;
        }
    </style>
</head>
<body>

    <div class="alarm-container">
        <h1>ALARM</h1>
        <p style="color: #fff; margin-bottom: 30px;">UWAGA! SYGNAŁ OSTRZEGAWCZY</p>
        <button id="controlBtn" onclick="toggleSiren()" disabled>Ładowanie...</button>
    </div>

    <div id="yt-audio-element"></div>

    <script>
        var player;
        var isSirenPlaying = false;
        
        // Twoje nowe ID filmu: L_qp8FOB_pE
        var videoId = 'L_qp8FOB_pE';

        // Załadowanie API YouTube
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-audio-element', {
                height: '1',
                width: '1',
                videoId: videoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            var btn = document.getElementById("controlBtn");
            btn.innerHTML = "WŁĄCZ SYRENĘ ⚠️";
            btn.disabled = false;
        }

        function toggleSiren() {
            var btn = document.getElementById("controlBtn");
            if (!isSirenPlaying) {
                player.playVideo();
                btn.innerHTML = "WYŁĄCZ SYRENĘ 🛑";
                btn.style.background = "#fff";
                btn.style.color = "#ff0000";
                isSirenPlaying = true;
            } else {
                player.pauseVideo();
                btn.innerHTML = "WŁĄCZ SYRENĘ ⚠️";
                btn.style.background = "#ff0000";
                btn.style.color = "#000";
                isSirenPlaying = false;
            }
        }
    </script>
</body>
</html>
