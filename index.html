<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFH Clan - Pet Simulator 99</title>
    <style>
        :root {
            --ps99-blue: #00b4ff;
            --ps99-yellow: #ffca28;
            --ps99-dark: #1a1a2e;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            background: var(--ps99-dark);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* --- PASEK BOCZNY --- */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.3);
            border-right: 2px solid var(--ps99-blue);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            backdrop-filter: blur(10px);
        }

        .sidebar-header {
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            color: var(--ps99-yellow);
            margin-bottom: 30px;
            text-shadow: 2px 2px 0px #000;
        }

        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: 0.3s;
            border-left: 4px solid transparent;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-item:hover {
            background: rgba(0, 180, 255, 0.1);
            color: white;
            border-left: 4px solid var(--ps99-blue);
        }

        .nav-item.active {
            background: rgba(0, 180, 255, 0.2);
            color: var(--ps99-blue);
            border-left: 4px solid var(--ps99-blue);
        }

        /* --- TREŚĆ GŁÓWNA --- */
        .main-content {
            flex-grow: 1;
            position: relative;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle, #2a2a4e 0%, #1a1a2e 100%);
        }

        /* Przycisk w rogu */
        .login-corner {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .btn-mini-login {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.3s;
        }

        .btn-mini-login:hover {
            background: var(--ps99-blue);
            color: white;
        }

        .hero-title {
            font-size: 60px;
            margin: 0;
            color: white;
            text-align: center;
        }

        .hero-subtitle {
            color: var(--ps99-blue);
            font-size: 20px;
            margin-bottom: 30px;
        }

        /* Sekcja nowości */
        .news-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            width: 80%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Okno logowania */
        #login-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: #252545;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--ps99-blue);
            width: 280px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background: #1a1a2e;
            color: white;
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            background: var(--ps99-blue);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- PASEK BOCZNY -->
    <div class="sidebar">
        <div class="sidebar-header">FIFH</div>
        <div class="nav-item active">🏠 Nowości</div>
        <div class="nav-item">💎 Bank Klanu</div>
        <div class="nav-item">🐾 Członkowie</div>
        <div class="nav-item">🏆 Leaderboard</div>
        <div class="nav-item">⚔️ Wojny Klanów</div>
        <div class="nav-item">📩 Rekrutacja</div>
    </div>

    <!-- TREŚĆ GŁÓWNA -->
    <div class="main-content">
        <div class="login-corner">
            <button class="btn-mini-login" onclick="toggleLogin()">ZALOGUJ</button>
        </div>

        <h1 class="hero-title">Witaj w FIFH</h1>
        <p class="hero-subtitle">Najlepszy klan w Pet Simulator 99</p>

        <div class="news-container">
            <h3>📢 Ostatnie Nowości:</h3>
            <ul>
                <li>Nowy update w PS99 już dostępny!</li>
                <li>Wpłacajcie diamenty na klanowy Bank.</li>
                <li>Trwa rekrutacja na nowych moderatorów.</li>
            </ul>
        </div>
    </div>

    <!-- LOGOWANIE -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>Panel Członka</h2>
            <input type="text" placeholder="Nick Roblox">
            <input type="password" id="pass" placeholder="Hasło">
            <button class="btn-submit" onclick="checkPass()">Zaloguj</button>
            <p onclick="toggleLogin()" style="cursor:pointer; font-size:12px; margin-top:15px; color:gray">Zamknij</p>
        </div>
    </div>

    <script>
        function toggleLogin() {
            const overlay = document.getElementById('login-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }

        function checkPass() {
            const pass = document.getElementById('pass').value;
            if (pass === "fifh99") {
                alert("Zalogowano pomyślnie!");
                toggleLogin();
            } else {
                alert("Błąd!");
            }
        }
    </script>

</body>
</html>
