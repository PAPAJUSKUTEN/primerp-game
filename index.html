<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUBA | Dev Core 2030</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --text: #e0e0e0;
            --text-dim: #808080;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* LEWA STRONA - BENTO INFO */
        .sidebar {
            display: grid;
            grid-template-rows: auto auto auto 1fr auto;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        /* MUZYKA - CARD */
        .music-card {
            cursor: pointer;
            border: 1px dashed var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
        }

        .music-card.playing {
            border-style: solid;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .pulse {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            display: none;
        }

        .playing .pulse {
            display: block;
            animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
        }

        .profile h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tag {
            display: inline-block;
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
        }

        .tech-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-item {
            font-size: 13px;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 10px;
        }

        /* PRAWA STRONA - TERMINAL */
        .terminal-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            padding: 15px 25px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-body {
            padding: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            line-height: 1.8;
            overflow-y: auto;
        }

        .code-keyword { color: #ff7b72; }
        .code-func { color: #d2a8ff; }
        .code-string { color: #a5d6ff; }

        /* Hidden Player */
        #youtube-player {
            position: absolute;
            width: 0;
            height: 0;
            pointer-events: none;
            opacity: 0;
        }

        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
        }
    </style>
</head>
<body>

<div id="youtube-player"></div>

<div class="container">
    <aside class="sidebar">
        <div class="card profile">
            <h1>Kuba.dev</h1>
            <span class="tag">SENIOR ARCHITECT</span>
            <p style="color: var(--text-dim); margin-top: 15px; font-size: 0.9rem;">4 lata doświadczenia w systemach JavaScript & C++.</p>
        </div>

        <!-- PRZYCISK MUZYKI -->
        <div class="card music-card" id="musicToggle" onclick="toggleMusic()">
            <div class="pulse"></div>
            <div style="font-weight: bold; letter-spacing: 1px; color: var(--accent);">NACIŚNIJ NA MNIE</div>
            <div id="musicStatus" style="font-size: 11px; color: var(--text-dim);">ODTWÓRZ ATMOSFERĘ (LO-FI)</div>
        </div>

        <div class="card">
            <h3 style="margin: 0 0 15px 0; font-size: 14px; text-transform: uppercase; color: var(--accent);">Stack Technologiczny</h3>
            <div class="tech-list">
                <span class="tech-item">JavaScript</span>
                <span class="tech-item">React</span>
                <span class="tech-item">Node.js</span>
                <span class="tech-item">Python</span>
                <span class="tech-item">C++</span>
            </div>
        </div>

        <div class="card" style="text-align: center; border-color: var(--accent); cursor: pointer;" onclick="window.location.href='mailto:twoj@email.com'">
            KONTAKT_ZAINICJOWANY.exe
        </div>
    </aside>

    <main class="terminal-container">
        <div class="terminal-header">
            <div style="display: flex; gap: 8px;">
                <div style="width:10px; height:10px; border-radius:50%; background:#ff5f56"></div>
                <div style="width:10px; height:10px; border-radius:50%; background:#ffbd2e"></div>
                <div style="width:10px; height:10px; border-radius:50%; background:#27c93f"></div>
            </div>
            <span style="font-size: 11px; color: var(--text-dim);">core_logic.cpp</span>
        </div>
        <div class="terminal-body" id="code"></div>
    </main>
</div>

<script>
    // YouTube API Logic
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    var isPlaying = false;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0',
            width: '0',
            videoId: '3GnwNV72UbE',
            playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': '3GnwNV72UbE' },
            events: { 'onReady': onPlayerReady }
        });
    }

    function onPlayerReady(event) {
        console.log("Audio System Ready");
    }

    function toggleMusic() {
        const card = document.getElementById('musicToggle');
        const status = document.getElementById('musicStatus');
        
        if (!isPlaying) {
            player.playVideo();
            card.classList.add('playing');
            status.innerText = "MUZYKA GRA: 3GnwNV72UbE";
            isPlaying = true;
        } else {
            player.pauseVideo();
            card.classList.remove('playing');
            status.innerText = "MUZYKA ZATRZYMANA";
            isPlaying = false;
        }
    }

    // Typewriter Logic
    const codeText = `// Kuba Core Initialization
#include <iostream>

int main() {
    auto experience = 4;
    std::string skills[] = {"JS", "React", "Node", "Python", "C++"};
    
    std::cout << "Kuba is 2030-ready." << std::endl;
    
    while(true) {
        build_future();
    }
    return 0;
}`;

    let i = 0;
    function type() {
        if (i < codeText.length) {
            document.getElementById("code").textContent += codeText.charAt(i);
            i++;
            setTimeout(type, 20);
        } else {
            const el = document.getElementById("code");
            let html = el.textContent
                .replace(/(#include|int|auto|return|while|true)/g, '<span class="code-keyword">$1</span>')
                .replace(/(main|cout|endl|build_future)/g, '<span class="code-func">$1</span>')
                .replace(/(\".*\")/g, '<span class="code-string">$1</span>');
            el.innerHTML = html;
        }
    }

    window.onload = type;
</script>

</body>
</html>
